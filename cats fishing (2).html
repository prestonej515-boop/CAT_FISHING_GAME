<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Fisherman RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Press Start 2P', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #f1c40f;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            background-color: #7ec850; 
            image-rendering: pixelated; 
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            line-height: 1.5;
            text-align: center;
            color: #bdc3c7;
        }
        kbd {
            background: #34495e;
            padding: 3px 6px;
            border-radius: 3px;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <h1>Cat Fishing</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div class="instructions">
        Move: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or <kbd>Arrows</kbd> | Go Inside: Walk into door<br><br>
        Near Water: <kbd>SPACE</kbd> to Cast / Reel <br>
        At Town Shop: <kbd>E</kbd> for Rods, Bait, Contracts, and Selling
    </div>

    <script>
        // ============================================================
        // CANVAS / SETUP
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ============================================================
        // AUDIO / SOUND SYSTEM
        // ============================================================
        const audioDefaults = {
        master: 0.85,
        music: 0.35,
        ambient: 0.55,
        sfx: 0.72,
        ui: 0.65,
        muted: false
        };

        const AudioManager = {
        ctx: null,
        masterGain: null,
        groups: {},
        settings: { ...audioDefaults },
        unlocked: false,
        cooldowns: {},
        ambientNodes: {},
        ambientTarget: {},
        lastFootstepAt: 0,
        footstepToggle: 0,
        nextBirdChirpAt: 0,
        menuToneStep: 0,

        loadSettings() {
        try {
        let saved = JSON.parse(localStorage.getItem('catFishingAudioSettings') || 'null');
        if (saved) this.settings = { ...audioDefaults, ...saved };
        } catch (err) {
        this.settings = { ...audioDefaults };
        }
        },

        saveSettings() {
        try { localStorage.setItem('catFishingAudioSettings', JSON.stringify(this.settings)); } catch (err) {}
        },

        init() {
        if (this.ctx) return;
        this.loadSettings();
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        this.ctx = new AudioCtx();
        this.masterGain = this.ctx.createGain();
        this.masterGain.connect(this.ctx.destination);
        ['music', 'ambient', 'sfx', 'ui'].forEach(group => {
        let gain = this.ctx.createGain();
        gain.connect(this.masterGain);
        this.groups[group] = gain;
        });
        this.createAmbientBeds();
        this.applySettings(true);
        },

        unlock() {
        this.init();
        if (!this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        if (!this.unlocked) {
        this.unlocked = true;
        this.play('uiConfirm', { volume: 0.32 });
        }
        },

        applySettings(immediate = false) {
        if (!this.ctx || !this.masterGain) return;
        let now = this.ctx.currentTime;
        let masterValue = this.settings.muted ? 0 : this.settings.master;
        this.rampGain(this.masterGain, masterValue, immediate ? 0.01 : 0.08);
        for (let group of ['music', 'ambient', 'sfx', 'ui']) {
        this.rampGain(this.groups[group], this.settings[group], immediate ? 0.01 : 0.08);
        }
        },

        setVolume(group, value) {
        if (!(group in this.settings)) return;
        this.settings[group] = clamp(value, 0, 1);
        this.applySettings();
        this.saveSettings();
        },

        toggleMute() {
        this.settings.muted = !this.settings.muted;
        this.applySettings();
        this.saveSettings();
        this.play(this.settings.muted ? 'uiCancel' : 'uiConfirm', { volume: 0.35, force: true });
        },

        resetSettings() {
        this.settings = { ...audioDefaults };
        this.applySettings();
        this.saveSettings();
        this.play('uiConfirm', { volume: 0.42, force: true });
        },

        rampGain(gain, value, time = 0.15) {
        if (!this.ctx || !gain) return;
        let now = this.ctx.currentTime;
        gain.gain.cancelScheduledValues(now);
        gain.gain.setTargetAtTime(value, now, Math.max(0.01, time));
        },

        canPlay(name, cooldown = 0.04) {
        let now = performance.now();
        if (!this.unlocked && name !== 'uiConfirm') return false;
        if ((this.cooldowns[name] || 0) > now) return false;
        this.cooldowns[name] = now + cooldown * 1000;
        return true;
        },

        output(group) {
        return this.groups[group] || this.groups.sfx || this.masterGain;
        },

        osc({ type = 'sine', freq = 440, endFreq = null, duration = 0.12, volume = 0.25, group = 'sfx', attack = 0.006, release = 0.05, delay = 0, detune = 0 }) {
        if (!this.ctx) return;
        let now = this.ctx.currentTime + delay;
        let osc = this.ctx.createOscillator();
        let gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        if (endFreq !== null) osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), now + duration);
        osc.detune.setValueAtTime(detune, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), now + attack);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration + release);
        osc.connect(gain);
        gain.connect(this.output(group));
        osc.start(now);
        osc.stop(now + duration + release + 0.03);
        },

        noise({ duration = 0.18, volume = 0.16, group = 'sfx', attack = 0.004, release = 0.08, filter = 900, type = 'lowpass', delay = 0 }) {
        if (!this.ctx) return;
        let now = this.ctx.currentTime + delay;
        let bufferSize = Math.max(1, Math.floor(this.ctx.sampleRate * duration));
        let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        let src = this.ctx.createBufferSource();
        let filterNode = this.ctx.createBiquadFilter();
        let gain = this.ctx.createGain();
        src.buffer = buffer;
        filterNode.type = type;
        filterNode.frequency.setValueAtTime(filter, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), now + attack);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration + release);
        src.connect(filterNode);
        filterNode.connect(gain);
        gain.connect(this.output(group));
        src.start(now);
        src.stop(now + duration + release + 0.02);
        },

        play(name, opts = {}) {
        this.init();
        if (!this.ctx || (!this.unlocked && !opts.force)) return;
        let v = opts.volume ?? 1;
        let p = opts.pitch ?? (0.96 + Math.random() * 0.08);
        if (!opts.force && !this.canPlay(name, opts.cooldown ?? 0.05)) return;

        if (name === 'uiMove') this.osc({ type: 'triangle', freq: 360 * p, endFreq: 520 * p, duration: 0.045, volume: 0.08 * v, group: 'ui', release: 0.025 });
        else if (name === 'uiConfirm') { this.osc({ type: 'triangle', freq: 440 * p, endFreq: 660 * p, duration: 0.07, volume: 0.12 * v, group: 'ui' }); this.osc({ type: 'sine', freq: 880 * p, duration: 0.08, volume: 0.045 * v, group: 'ui', delay: 0.045 }); }
        else if (name === 'uiCancel') this.osc({ type: 'triangle', freq: 420 * p, endFreq: 220 * p, duration: 0.09, volume: 0.11 * v, group: 'ui' });
        else if (name === 'uiError') { this.osc({ type: 'square', freq: 155 * p, duration: 0.075, volume: 0.055 * v, group: 'ui' }); this.osc({ type: 'triangle', freq: 130 * p, duration: 0.08, volume: 0.05 * v, group: 'ui', delay: 0.06 }); }
        else if (name === 'menuStart') { this.osc({ type: 'triangle', freq: 330, endFreq: 660, duration: 0.16, volume: 0.16 * v, group: 'ui' }); this.osc({ type: 'sine', freq: 990, duration: 0.24, volume: 0.08 * v, group: 'music', delay: 0.09 }); }
        else if (name === 'cast') { this.noise({ duration: 0.11, volume: 0.055 * v, filter: 1300, type: 'bandpass' }); this.osc({ type: 'sine', freq: 260 * p, endFreq: 170 * p, duration: 0.12, volume: 0.045 * v }); }
        else if (name === 'splash') { this.noise({ duration: 0.28, volume: 0.13 * v, filter: 850, type: 'lowpass' }); this.osc({ type: 'sine', freq: 140 * p, endFreq: 70 * p, duration: 0.18, volume: 0.04 * v }); }
        else if (name === 'bite') { this.osc({ type: 'triangle', freq: 720, endFreq: 1120, duration: 0.08, volume: 0.18 * v }); this.osc({ type: 'sine', freq: 1480, duration: 0.11, volume: 0.11 * v, delay: 0.065 }); }
        else if (name === 'reel') this.osc({ type: 'triangle', freq: 520 * p, endFreq: 620 * p, duration: 0.045, volume: 0.045 * v, cooldown: 0.12 });
        else if (name === 'catchSuccess') { this.osc({ type: 'triangle', freq: 392, endFreq: 523, duration: 0.13, volume: 0.14 * v }); this.osc({ type: 'triangle', freq: 659, endFreq: 784, duration: 0.18, volume: 0.11 * v, delay: 0.09 }); this.noise({ duration: 0.22, volume: 0.055 * v, filter: 1500, delay: 0.04 }); }
        else if (name === 'catchRare') { this.play('catchSuccess', { volume: 0.9 * v, force: true }); this.osc({ type: 'sine', freq: 1320, duration: 0.18, volume: 0.08 * v, delay: 0.16 }); this.osc({ type: 'sine', freq: 1760, duration: 0.18, volume: 0.055 * v, delay: 0.24 }); }
        else if (name === 'catchTrash') { this.noise({ duration: 0.16, volume: 0.065 * v, filter: 500, type: 'lowpass' }); this.osc({ type: 'sawtooth', freq: 120 * p, endFreq: 95 * p, duration: 0.11, volume: 0.04 * v }); }
        else if (name === 'catchFail') { this.osc({ type: 'triangle', freq: 250 * p, endFreq: 125 * p, duration: 0.2, volume: 0.11 * v }); this.noise({ duration: 0.13, volume: 0.045 * v, filter: 400, delay: 0.03 }); }
        else if (name === 'purchase') { this.osc({ type: 'triangle', freq: 660, duration: 0.08, volume: 0.12 * v, group: 'sfx' }); this.osc({ type: 'sine', freq: 990, duration: 0.12, volume: 0.08 * v, group: 'sfx', delay: 0.06 }); }
        else if (name === 'sell') { this.osc({ type: 'triangle', freq: 620, endFreq: 930, duration: 0.12, volume: 0.12 * v }); this.osc({ type: 'triangle', freq: 800, duration: 0.08, volume: 0.08 * v, delay: 0.08 }); }
        else if (name === 'equip') this.osc({ type: 'triangle', freq: 520 * p, endFreq: 700 * p, duration: 0.09, volume: 0.1 * v });
        else if (name === 'door') { this.noise({ duration: 0.18, volume: 0.08 * v, filter: 430, type: 'lowpass' }); this.osc({ type: 'sine', freq: 135 * p, endFreq: 95 * p, duration: 0.16, volume: 0.04 * v }); }
        else if (name === 'shopBell') { this.osc({ type: 'sine', freq: 1046, duration: 0.18, volume: 0.08 * v }); this.osc({ type: 'sine', freq: 1568, duration: 0.12, volume: 0.04 * v, delay: 0.04 }); }
        else if (name === 'inventory') this.osc({ type: 'triangle', freq: 300 * p, endFreq: 390 * p, duration: 0.08, volume: 0.08 * v, group: 'ui' });
        else if (name === 'talk') { this.osc({ type: 'triangle', freq: 420 * p, duration: 0.05, volume: 0.08 * v }); this.osc({ type: 'triangle', freq: 480 * p, duration: 0.05, volume: 0.06 * v, delay: 0.055 }); }
        else if (name === 'dialogCat') { this.osc({ type: 'triangle', freq: 640 * p, endFreq: 820 * p, duration: 0.035, volume: 0.035 * v }); this.osc({ type: 'sine', freq: 980 * p, duration: 0.04, volume: 0.018 * v, delay: 0.03 }); }
        else if (name === 'dialogDog') { this.osc({ type: 'triangle', freq: 260 * p, endFreq: 210 * p, duration: 0.055, volume: 0.045 * v }); this.noise({ duration: 0.045, volume: 0.018 * v, filter: 520, type: 'lowpass', delay: 0.02 }); }
        else if (name === 'dialogGrandpa') { this.osc({ type: 'sawtooth', freq: 230 * p, endFreq: 180 * p, duration: 0.06, volume: 0.032 * v }); this.noise({ duration: 0.055, volume: 0.018 * v, filter: 360, type: 'lowpass', delay: 0.025 }); }
        else if (name === 'paperRustle') this.noise({ duration: 0.16, volume: 0.055 * v, filter: 2200, type: 'highpass' });
        else if (name === 'footstepGrass') this.noise({ duration: 0.055, volume: 0.045 * v, filter: 720, type: 'lowpass' });
        else if (name === 'footstepWood') { this.noise({ duration: 0.04, volume: 0.04 * v, filter: 1000, type: 'bandpass' }); this.osc({ type: 'sine', freq: 135 * p, duration: 0.035, volume: 0.025 * v }); }
        else if (name === 'truck') this.osc({ type: 'sawtooth', freq: 82 * p, endFreq: 95 * p, duration: 0.08, volume: 0.035 * v, group: 'sfx' });
        else if (name === 'bird') { this.osc({ type: 'sine', freq: 1300 * p, endFreq: 1760 * p, duration: 0.06, volume: 0.035 * v, group: 'ambient' }); this.osc({ type: 'sine', freq: 1450 * p, endFreq: 1180 * p, duration: 0.07, volume: 0.025 * v, group: 'ambient', delay: 0.08 }); }
        },

        createAmbientBeds() {
        if (!this.ctx || this.ambientNodes.outdoor) return;
        const makeNoiseLoop = (name, filterFreq, type, gainValue) => {
        let buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 2, this.ctx.sampleRate);
        let data = buffer.getChannelData(0);
        let last = 0;
        for (let i = 0; i < data.length; i++) {
        last = last * 0.96 + (Math.random() * 2 - 1) * 0.04;
        data[i] = last;
        }
        let src = this.ctx.createBufferSource();
        let filter = this.ctx.createBiquadFilter();
        let gain = this.ctx.createGain();
        src.buffer = buffer;
        src.loop = true;
        filter.type = type;
        filter.frequency.value = filterFreq;
        gain.gain.value = 0;
        src.connect(filter);
        filter.connect(gain);
        gain.connect(this.output('ambient'));
        src.start();
        this.ambientNodes[name] = { gain, filter, src, base: gainValue };
        this.ambientTarget[name] = 0;
        };
        makeNoiseLoop('outdoor', 950, 'lowpass', 0.18);
        makeNoiseLoop('water', 520, 'lowpass', 0.16);
        makeNoiseLoop('rain', 1850, 'highpass', 0.14);
        makeNoiseLoop('indoor', 260, 'lowpass', 0.045);
        makeNoiseLoop('shop', 340, 'lowpass', 0.06);
        },

        setAmbientTarget(name, value) {
        this.ambientTarget[name] = clamp(value, 0, 1);
        },

        updateAmbient() {
        if (!this.ctx) return;
        let biome = typeof getPlayerAmbientRegion === 'function' ? getPlayerAmbientRegion() : 'home';
        let outdoors = gameState === 'playing' && currentScene === 'outdoors';
        let indoors = gameState === 'playing' && currentScene === 'indoors';
        let shop = gameState === 'playing' && currentScene === 'shop';
        let intro = gameState === 'intro';
        let introScene = introCutscene.scenes[introCutscene.sceneIndex]?.id || '';
        let menu = gameState === 'menu';
        this.setAmbientTarget('outdoor', outdoors ? (biome === 'lake' ? 0.42 : 0.56) : (intro && introScene === 'arrival' ? 0.5 : (menu ? 0.28 : 0.02)));
        this.setAmbientTarget('water', outdoors ? (biome === 'ocean' ? 0.85 : biome === 'lake' ? 0.5 : 0.32) : (intro && introScene === 'arrival' ? 0.45 : (menu ? 0.38 : 0.01)));
        this.setAmbientTarget('rain', isRaining ? (outdoors ? rainIntensity : (indoors || shop ? rainIntensity * 0.12 : rainIntensity * 0.2)) : 0);
        this.setAmbientTarget('indoor', indoors || (intro && introScene !== 'arrival') ? 0.55 : 0);
        this.setAmbientTarget('shop', shop ? 0.7 : 0);

        for (let name in this.ambientNodes) {
        let node = this.ambientNodes[name];
        let target = (this.ambientTarget[name] || 0) * node.base;
        this.rampGain(node.gain, target, 0.65);
        }

        let nowMs = performance.now();
        if (outdoors && nowMs > this.nextBirdChirpAt && !isRaining) {
        this.play('bird', { volume: 0.65, cooldown: 0.1 });
        this.nextBirdChirpAt = nowMs + 7000 + Math.random() * 12000;
        }
        if (menu && this.unlocked && nowMs > this.menuToneStep) {
        let notes = [262, 330, 392, 523];
        let idx = Math.floor(nowMs / 2400) % notes.length;
        this.osc({ type: 'sine', freq: notes[idx], duration: 0.65, volume: 0.018, group: 'music', release: 0.25 });
        this.menuToneStep = nowMs + 2300;
        }
        },

        updateFootsteps(moving, surface, driving = false) {
        if (!this.unlocked || !moving) return;
        let now = performance.now();
        if (driving) {
        if (now - this.lastFootstepAt > 260) {
        this.play('truck', { volume: 0.55, cooldown: 0.18 });
        this.lastFootstepAt = now;
        }
        return;
        }
        let cadence = surface === 'wood' || surface === 'indoorWood' || surface === 'shopWood' ? 275 : 330;
        if (now - this.lastFootstepAt > cadence) {
        let name = surface === 'wood' || surface === 'indoorWood' || surface === 'shopWood' ? 'footstepWood' : 'footstepGrass';
        this.footstepToggle = 1 - this.footstepToggle;
        this.play(name, { volume: surface === 'grass' ? 0.65 : 0.75, pitch: this.footstepToggle ? 1.04 : 0.94, cooldown: 0.08 });
        this.lastFootstepAt = now;
        }
        },

        update() {
        if (!this.ctx) return;
        this.updateAmbient();
        }
        };

        AudioManager.loadSettings();

        function playUISound(name, opts = {}) { AudioManager.play(name, opts); }

        // ============================================================
        // CONSTANTS / CONFIG
        // ============================================================
        const keys = {};
        let gameState = 'menu'; // 'menu', 'intro', or 'playing'
        let currentScene = 'outdoors'; // 'outdoors', 'indoors', or 'shop'
        const MAP_WIDTH = 1600;
        const WORLD_TOP = -760;
        const WORLD_BOTTOM = 2240;
        let cameraX = 0;
        let cameraY = 0;

        // ============================================================
        // GAME DATA
        // ============================================================
        // Rods mainly control reel handling. Bait controls what can be hooked.
        const rodUpgrades =[
        { level: 1, cost: 0, color: '#bdc3c7', name: 'Stick', spotMulti: 1.00, speedMulti: .98 },
        { level: 2, cost: 55, color: '#f1c40f', name: 'Bamboo', spotMulti: 1.04, speedMulti: 0.92 },
        { level: 3, cost: 175, color: '#2ecc71', name: 'Fiberglass', spotMulti: 1.08, speedMulti: 0.84 },
        { level: 4, cost: 450, color: '#3498db', name: 'Carbon', spotMulti: 1.12, speedMulti: 0.75 },
        { level: 5, cost: 950, color: '#9b59b6', name: 'Magic', spotMulti: 1.16, speedMulti: 0.66 }
        ];
        const baitTypes = [
        { id: 'crumbs', level: 1, cost: 0, color: '#d7b46a', name: 'Crumbs', weightIndex: 0, maxFishValue: 24, maxFishSpeed: 0.050, overLimitWeight: 0.08, sizeBias: 0.16 },
        { id: 'worms', level: 2, cost: 30, color: '#c0392b', name: 'Garden Worms', weightIndex: 1, maxFishValue: 55, maxFishSpeed: 0.064, overLimitWeight: 0.12, sizeBias: 0.30 },
        { id: 'minnows', level: 3, cost: 95, color: '#95a5a6', name: 'Live Minnows', weightIndex: 2, maxFishValue: 90, maxFishSpeed: 0.078, overLimitWeight: 0.18, sizeBias: 0.46 },
        { id: 'glow_grubs', level: 4, cost: 240, color: '#48c9b0', name: 'Glow Grubs', weightIndex: 3, maxFishValue: 145, maxFishSpeed: 0.086, overLimitWeight: 0.28, sizeBias: 0.62 },
        { id: 'star_lure', level: 5, cost: 575, color: '#f1c40f', name: 'Star Lure', weightIndex: 4, maxFishValue: 999, maxFishSpeed: 0.120, overLimitWeight: 0.50, sizeBias: 0.78 }
        ];

        const fishingBalance = {
        minigameSpeedMin: 0.014,
        minigameSpeedMax: 0.115,
        lengthSpeedBonusMax: 0.36,
        valueSpeedBonusMax: 0.22,
        weakRodPenaltyMax: 0.24,
        sweetSpotMin: 0.035,
        sweetSpotMax: 0.34
        };

        // Fish species are grouped by biome pools below. Weights are read by bait tier.
        const generalFishTypes =[
        { name: 'Old Boot', value: 0, minLength: 8, maxLength: 14, color: '#7f8c8d', baseSpeed: 0.02, baseSpot: 0.30, weights: [25, 15, 5, 1] },
        { name: 'Minnow', value: 5, minLength: 1.5, maxLength: 4, color: '#bdc3c7', baseSpeed: 0.025, baseSpot: 0.25, weights:[55, 40, 25, 10] },
        { name: 'Trout', value: 12, minLength: 10, maxLength: 24, color: '#2ecc71', baseSpeed: 0.035, baseSpot: 0.20, weights: [15, 25, 30, 20] },
        { name: 'Salmon', value: 30, minLength: 20, maxLength: 36, color: '#e74c3c', baseSpeed: 0.050, baseSpot: 0.12, weights:[4.5, 15, 25, 35] },
        { name: 'Catfish', value: 60, minLength: 18, maxLength: 40, color: '#34495e', baseSpeed: 0.065, baseSpot: 0.08, weights: [0.4, 4, 12, 24] },
        { name: 'Golden Koi', value: 150, minLength: 12, maxLength: 28, color: '#f1c40f', baseSpeed: 0.085, baseSpot: 0.04, weights:[0.1, 1, 3, 10] },
        { name: 'Bluegill', value: 8, minLength: 4, maxLength: 12, color: '#5dade2', baseSpeed: 0.030, baseSpot: 0.23, weights:[20, 24, 24, 18] },
        { name: 'Perch', value: 10, minLength: 6, maxLength: 14, color: '#f4d03f', baseSpeed: 0.034, baseSpot: 0.21, weights:[16, 22, 24, 18] },
        { name: 'Crappie', value: 14, minLength: 6, maxLength: 15, color: '#d5dbdb', baseSpeed: 0.038, baseSpot: 0.19, weights:[12, 18, 22, 18] },
        { name: 'Small Bass', value: 18, minLength: 10, maxLength: 18, color: '#229954', baseSpeed: 0.043, baseSpot: 0.17, weights:[8, 15, 22, 22] },
        { name: 'Mud Sucker', value: 22, minLength: 8, maxLength: 18, color: '#8e5b3a', baseSpeed: 0.046, baseSpot: 0.16, weights:[7, 13, 18, 18] },

        function getFishPoolForBiome(biome) {
        return fishPools[biome] || fishPools.home;

        function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
        }

        function getCurrentRod() {
        return rodUpgrades[Math.max(0, Math.min(player.rodLevel - 1, rodUpgrades.length - 1))];
        }

        function getBaitByLevel(level) {
        return baitTypes[Math.max(0, Math.min(level - 1, baitTypes.length - 1))];
        }

        function getCurrentBait() {
        return getBaitByLevel(player.baitLevel);
        }

        function getSouthLakeUnlockRequirements() {
        return {
        rod: rodUpgrades[Math.min(1, rodUpgrades.length - 1)],
        bait: baitTypes[Math.min(1, baitTypes.length - 1)]
        };
        }

        function isSouthLakeUnlocked() {
        let req = getSouthLakeUnlockRequirements();
        return player.rodLevel >= req.rod.level && player.baitLevel >= req.bait.level;

        let level = Math.max(1, Math.min(rodLevel, rodUpgrades.length));
        return [
        { maxFishValue: 24, maxFishSpeed: 0.050, overLimitWeight: 0.025 },
        { maxFishValue: 55, maxFishSpeed: 0.064, overLimitWeight: 0.08 },
        { maxFishValue: 90, maxFishSpeed: 0.078, overLimitWeight: 0.18 },
        { maxFishValue: 145, maxFishSpeed: 0.090, overLimitWeight: 0.35 },
        { maxFishValue: 999, maxFishSpeed: 0.120, overLimitWeight: 0.65 }
        ][level - 1];
        }

        function getSpeciesBaitWeight(species, bait, rodLevel = player.rodLevel) {
        let weights = species.weights || [1];
        let baseIndex = Math.min(bait.weightIndex, weights.length - 1);
        let weight = weights[baseIndex] || 0;
        let originalWeight = weight;
        if (bait.weightIndex >= weights.length) weight *= 1.2;

        let rodLimits = getRodFishLimits(rodLevel);
        let valueLimit = Math.min(bait.maxFishValue, rodLimits.maxFishValue);
        let speedLimit = Math.min(bait.maxFishSpeed, rodLimits.maxFishSpeed);
        let exceedsValue = species.value > valueLimit;
        let exceedsSpeed = species.baseSpeed > speedLimit;
        if (exceedsValue || exceedsSpeed) {
        let valuePressure = species.value > 0 ? species.value / Math.max(1, valueLimit) : 1;
        let speedPressure = species.baseSpeed / Math.max(0.001, speedLimit);
        let pressure = Math.max(valuePressure, speedPressure);
        let penalty = Math.min(bait.overLimitWeight, rodLimits.overLimitWeight);
        let luckyCatchFloor = Math.min(originalWeight, 0.02);
        weight = Math.max(weight * penalty / Math.max(1, pressure), luckyCatchFloor);
        }
        return weight;
        }

        function getRandomFish(baitLevel, biome = 'home') {
        let totalWeight = 0;
        let bait = getBaitByLevel(baitLevel);
        let rodLevel = player.rodLevel;
        let pool = getFishPoolForBiome(biome);
        let weightedFish = [];

        for (let group of pool) {
        for (let f of group.fish) {
        let weight = getSpeciesBaitWeight(f, bait, rodLevel) * group.weightScale;
        weightedFish.push({ fish: f, weight });
        totalWeight += weight;
        }
        }

        if (totalWeight <= 0) return pool[0].fish[0];
        let roll = Math.random() * totalWeight;
        for (let entry of weightedFish) {
        roll -= entry.weight;
        if (roll <= 0) return entry.fish;
        }
        return pool[0].fish[0]; // Fallback
        }

        function rollWeightedRarity() {
        let totalWeight = rarityTiers.reduce((sum, tier) => sum + tier.weight, 0);
        let roll = Math.random() * totalWeight;
        for (let tier of rarityTiers) {
        roll -= tier.weight;
        if (roll <= 0) return tier;
        }
        return rarityTiers[0];
        }

        function rollFishLength(species, bait) {
        let minLength = species.minLength || 1;
        let maxLength = species.maxLength || minLength;
        let roll = Math.random();
        let shapedRoll = Math.pow(roll, 1 / (1 + bait.sizeBias));
        return minLength + shapedRoll * (maxLength - minLength);
        }

        function getLengthMultiplier(species, length) {
        if (species.maxLength <= species.minLength) return 1;
        let lengthRatio = getFishLengthRatio(species, length);
        return fishValueSettings.lengthMultiplierMin + lengthRatio * (fishValueSettings.lengthMultiplierMax - fishValueSettings.lengthMultiplierMin);
        }

        function getFishLengthRatio(species, length) {
        if (species.maxLength <= species.minLength) return 0;
        return clamp((length - species.minLength) / (species.maxLength - species.minLength), 0, 1);
        }

        function calculateFishValue(species, rarity, length) {
        if (species.value <= 0) return 0;
        let rarityMultiplier = rarity.valueMultiplier;
        let lengthMultiplier = getLengthMultiplier(species, length);
        return Math.max(1, Math.round(species.value * rarityMultiplier * lengthMultiplier));
        }

        function createCaughtFish(species, bait) {
        let rarity = rollWeightedRarity();
        let length = rollFishLength(species, bait);
        return {
        ...species,
        speciesName: species.name,
        rarity: rarity.id,
        rarityLabel: rarity.label,
        rarityMultiplier: rarity.valueMultiplier,
        rarityColor: rarity.color,
        length: length,
        lengthDisplay: formatFishLength(length),
        value: calculateFishValue(species, rarity, length),
        baseValue: species.value,
        baitId: bait.id,
        baitName: bait.name,
        lengthRatio: getFishLengthRatio(species, length)
        };
        }

        function getCatchSweetSpot(fish, rod) {
        return clamp(fish.baseSpot * rod.spotMulti, fishingBalance.sweetSpotMin, fishingBalance.sweetSpotMax);
        }

        function getMinigameSpeed(fish, rod) {
        let lengthBoost = 1 + fish.lengthRatio * fishingBalance.lengthSpeedBonusMax;
        let valueBoost = 1 + clamp(fish.baseValue / 170, 0, 1) * fishingBalance.valueSpeedBonusMax;
        let weakRodGap = clamp((fish.baseSpeed - 0.045) / 0.05, 0, 1) * clamp((rod.speedMulti - 0.66) / 0.34, 0, 1);
        let weakRodPenalty = 1 + weakRodGap * fishingBalance.weakRodPenaltyMax;
        let speed = fish.baseSpeed * lengthBoost * valueBoost * weakRodPenalty * rod.speedMulti;
        return clamp(speed, fishingBalance.minigameSpeedMin, fishingBalance.minigameSpeedMax);
        }

        function formatFishLength(length) {
        return `${length.toFixed(1)} in`;
        }

        function getCatchMessage(fish) {
        return `${fish.rarityLabel} ${fish.name} ${fish.lengthDisplay} $${fish.value}`;
        }

        // CALCULATE IF WON OR LOST

        // ============================================================
        // COLLISION / TRIGGER HELPERS
        // ============================================================
        function rectIntersect(r1, r2) {
        return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
        }

        function inZone(p, zone) { return rectIntersect({x: p.x, y: p.y, w: p.w, h: p.h}, zone); }

        function rectInside(rect, zone) {
        return rect.x >= zone.x &&
               rect.x + rect.w <= zone.x + zone.w &&
               rect.y >= zone.y &&
               rect.y + rect.h <= zone.y + zone.h;
        }

        function rectOnBridge(rect, bridge) {
        if (bridge.x1 === undefined) return rectInside(rect, bridge);
        let cx = rect.x + rect.w / 2;
        let cy = rect.y + rect.h / 2;
        return pointOnBridge(cx, cy, bridge);
        }

        function pointOnBridge(px, py, bridge) {
        if (bridge.x1 === undefined) return px >= bridge.x && px <= bridge.x + bridge.w && py >= bridge.y && py <= bridge.y + bridge.h;
        let dx = bridge.x2 - bridge.x1;
        let dy = bridge.y2 - bridge.y1;
        let lenSq = dx * dx + dy * dy;
        if (lenSq <= 0) return false;
        let t = ((px - bridge.x1) * dx + (py - bridge.y1) * dy) / lenSq;
        if (t < -0.03 || t > 1.03) return false;
        let bridgeX = bridge.x1 + dx * t;
        let bridgeY = bridge.y1 + dy * t;
        let distance = Math.sqrt((px - bridgeX) * (px - bridgeX) + (py - bridgeY) * (py - bridgeY));
        return distance <= (bridge.width || Math.max(bridge.w, bridge.h)) / 2 - 3;
        }

        function isWaterWalkable(rect) {
        return rectInside(rect, dock) || rectInside(rect, lakeIsland) || rectOnBridge(rect, lakeBridgeA) || rectOnBridge(rect, lakeBridgeB);
        }

        function isPointInRect(px, py, rect) {
        return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
        }

        function isFishingProbeOnLakeLand(rect) {
        let cx = rect.x + rect.w / 2;
        let cy = rect.y + rect.h / 2;
        return isPointInRect(cx, cy, lakeIsland) || pointOnBridge(cx, cy, lakeBridgeA) || pointOnBridge(cx, cy, lakeBridgeB);
        }

        function isOnDock(rect) {
        return rectInside(rect, dock);
        }

        function canMoveTo(x, y) {
        let nextRect = { x: x, y: y, w: player.w, h: player.h };

        if (currentScene === 'outdoors') {
          if (x < 0 || y < WORLD_TOP || x + player.w > MAP_WIDTH || y + player.h > WORLD_BOTTOM) return false;
         for (let wall of hutWalls) if (rectIntersect(nextRect, wall)) return false;
         for (let box of mailboxes) if (box.collision && rectIntersect(nextRect, box.collision)) return false;
        if (rectIntersect(nextRect, shop)) return false;
        if (rectIntersect(nextRect, roadSign.collision)) return false;
        if (!isSouthLakeUnlocked() && rectIntersect(nextRect, southLakeGate.collision)) return false;
         for (let tree of lakeTreeLine) if (rectIntersect(nextRect, tree)) return false;
         for (let w of waterBlocks) if (rectIntersect(nextRect, w) && !isWaterWalkable(nextRect)) return false;
        return true;

        } else if (currentScene === 'indoors') {
             if (x < room.x || y < room.y || x + player.w > room.x + room.w || y + player.h > room.y + room.h) {
                if (!rectIntersect(nextRect, roomExit)) return false;
         }
        if (rectIntersect(nextRect, bed)) return false;
        return true;

        } else if (currentScene === 'shop') {
            if (x < shopRoom.x || y < shopRoom.y || x + player.w > shopRoom.x + shopRoom.w || y + player.h > shopRoom.y + shopRoom.h) {
                if (!rectIntersect(nextRect, shopExit)) return false;
            }

    // counter collision
            if (rectIntersect(nextRect, shopCounter)) return false;

            return true;
        }

        return false;
        }
        function getFishingProbeRect() {
        let rodEndX = player.x; let rodEndY = player.y;
        if (player.facing === 'left') { rodEndX -= 25; rodEndY += 5; }
        else if (player.facing === 'right') { rodEndX += player.w + 25; rodEndY += 5; }
        else if (player.facing === 'up') { rodEndX += 10; rodEndY -= 25; }
        else { rodEndX += 10; rodEndY += player.h + 25; }

        return { x: rodEndX - 4, y: rodEndY - 4, w: 8, h: 8 };
        }

        function getFacingWaterBiome() {
        let bobberRect = getFishingProbeRect();
        for(let w of waterBlocks) {
        if(rectIntersect(bobberRect, w)) {
        if ((w.biome || 'home') === 'lake' && isFishingProbeOnLakeLand(bobberRect)) continue;
        return w.biome || 'home';
        }
        }
        return null;
        }

        function isFacingWater() {
        return getFacingWaterBiome() !== null;
        }

        function getPlayerAmbientRegion() {
        if (currentScene !== 'outdoors') return currentScene;
        let center = { x: player.x + player.w / 2, y: player.y + player.h / 2 };
        if (isPointInRect(center.x, center.y, lakeShore)) return 'lake';
        if (center.y < beach.y + 190) return 'ocean';
        return 'home';
        }

        function getPlayerSurfaceType() {
        if (currentScene === 'shop') return 'shopWood';
        if (currentScene === 'indoors') return 'indoorWood';
        let rect = { x: player.x, y: player.y, w: player.w, h: player.h };
        if (isOnDock(rect) || rectOnBridge(rect, bridge) || rectOnBridge(rect, lakeBridgeA) || rectOnBridge(rect, lakeBridgeB)) return 'wood';
        return 'grass';
        }

        function completeStoryObjective(id, nextId = null) {

        function updateIntroCutscene() {
        let now = performance.now();
        let dt = Math.min(0.05, (now - (introCutscene.lastTime || now)) / 1000);
        introCutscene.lastTime = now;
        if (keys['Space']) {
        introCutscene.skipHold += dt;
        if (introCutscene.skipHold >= introCutscene.skipRequired) {
        finishIntroCutscene();
        return;
        }
        }
        let scene = introCutscene.scenes[introCutscene.sceneIndex];
        if (!scene) {
        finishIntroCutscene();
        return;
        }
        introCutscene.sceneTime += dt;
        let activeLineIndex = -1;
        for (let i = 0; i < scene.lines.length; i++) {
        let nextAt = scene.lines[i + 1] ? scene.lines[i + 1].at : scene.duration + 1;
        if (introCutscene.sceneTime >= scene.lines[i].at && introCutscene.sceneTime < nextAt) activeLineIndex = i;
        }
        let key = `${scene.id}:${activeLineIndex}`;
        if (activeLineIndex >= 0 && key !== introCutscene.currentDialogueKey) {
        introCutscene.currentDialogueKey = key;
        playDialogueVoice(scene.lines[activeLineIndex].voice);
        }
        if (introCutscene.sceneTime >= scene.duration) {
        introCutscene.sceneIndex++;
        introCutscene.sceneTime = 0;
        introCutscene.currentDialogueKey = '';
        if (introCutscene.sceneIndex >= introCutscene.scenes.length) finishIntroCutscene();
        }
        }

        function getActiveQuest() {

        function awardMoney(amount, showText = true, countsForQuest = true) {

        function completeActiveQuest() {

        function syncActiveQuestProgress() {
        let quest = getActiveQuest();
        if (!quest || quest.completed) return;
        if (quest.id === 'catch_3_fish') quest.progress = Math.min(quest.goal, player.totalFishCaught);
        else if (quest.id === 'earn_50_total') quest.progress = Math.min(quest.goal, player.totalMoneyEarned);
        else if (quest.id === 'buy_first_rod') quest.progress = player.rodLevel > 1 ? 1 : 0;
        else if (quest.id === 'unlock_south_lake') quest.progress = isSouthLakeUnlocked() ? 1 : 0;
        if (quest.progress >= quest.goal) completeActiveQuest();
        }

        function updateQuestProgress(type, data = {}) {
        let quest = getActiveQuest();
        if (!quest || quest.completed) return;
        if (type === 'fishCaught') {
        if (quest.id === 'catch_3_fish') quest.progress = Math.min(quest.goal, quest.progress + 1);
        else if (quest.id === 'catch_trout' && data.speciesName === 'Trout') quest.progress = 1;
        }
        else if (type === 'moneyEarned' && quest.id === 'earn_50_total') {
        quest.progress = Math.min(quest.goal, player.totalMoneyEarned);
        }
        else if (type === 'rodUpgraded' && quest.id === 'buy_first_rod' && player.rodLevel > 1) {
        quest.progress = 1;
        }
        else if (type === 'southLakeUnlocked' && quest.id === 'unlock_south_lake' && isSouthLakeUnlocked()) {
        quest.progress = 1;
        }
        if (quest.progress >= quest.goal) completeActiveQuest();
        }

        function updateQuestFlow() {
        let quest = getActiveQuest();
        if (!quest) return;
        if (quest.completed) {
        if (player.questCompleteTimer > 0) player.questCompleteTimer--;
        if (player.questCompleteTimer <= 0 && player.activeQuestIndex < quests.length - 1) {
        player.activeQuestIndex++;
        syncActiveQuestProgress();
        }
        return;
        }
        syncActiveQuestProgress();
        }

        // ============================================================
        // FISHING CONTRACT BOARD SYSTEM
        // ============================================================
        function getUnlockedContractBiomes() {
        let biomes = ['home', 'ocean'];
        if (isSouthLakeUnlocked()) biomes.push('lake');
        return biomes;
        }

        function getOwnedBaitObjects() {
        return player.ownedBaitLevels.map(level => getBaitByLevel(level));
        }

        function getContractDifficultyTier() {
        let maxBaitLevel = Math.max(...player.ownedBaitLevels);
        let score = (player.rodLevel - 1) + (maxBaitLevel - 1) + (isSouthLakeUnlocked() ? 1 : 0);
        if (score <= 1) return 1;
        if (score <= 3) return 2;
        if (score <= 5) return 3;
        return 4;
        }

        function getSpeciesBestOwnedBaitWeight(species) {
        return getOwnedBaitObjects().reduce((best, bait) => Math.max(best, getSpeciesBaitWeight(species, bait, player.rodLevel)), 0);
        }

        function getBiomesForSpecies(species) {
        let matches = [];
        for (let biome in fishPools) {
        let pool = fishPools[biome];
        if (pool.some(group => group.fish.includes(species))) matches.push(biome);
        }
        return matches;
        }

        function isSpeciesInBiome(species, biome) {
        return getBiomesForSpecies(species).includes(biome);
        }

        function estimateContractFishSpeed(species, lengthRatio = 0.55) {
        let rod = getCurrentRod();
        return getMinigameSpeed({
        ...species,
        baseValue: species.value,
        lengthRatio
        }, rod);
        }

        function canPlayerReasonablyCatchSpecies(species, tier = getContractDifficultyTier(), biome = null) {
        if (!species || species.value <= 0) return false;
        if (biome && !isSpeciesInBiome(species, biome)) return false;
        let unlockedBiomes = getUnlockedContractBiomes();
        if (!getBiomesForSpecies(species).some(speciesBiome => unlockedBiomes.includes(speciesBiome))) return false;

        let baitWeight = getSpeciesBestOwnedBaitWeight(species);
        let requiredWeight = tier <= 1 ? 5 : tier === 2 ? 2.5 : tier === 3 ? 1.1 : 0.35;
        if (baitWeight < requiredWeight) return false;

        let speed = estimateContractFishSpeed(species, tier >= 3 ? 0.7 : 0.55);
        let speedLimit = tier <= 1 ? 0.064 : tier === 2 ? 0.080 : tier === 3 ? 0.098 : 0.115;
        return speed <= speedLimit;
        }

        function getEligibleContractSpecies(tier = getContractDifficultyTier(), biome = null) {
        let unlockedBiomes = getUnlockedContractBiomes();
        let speciesSet = new Set();
        let sourceBiomes = biome ? [biome] : unlockedBiomes;
        for (let sourceBiome of sourceBiomes) {
        if (!unlockedBiomes.includes(sourceBiome)) continue;
        for (let group of getFishPoolForBiome(sourceBiome)) {
        for (let species of group.fish) speciesSet.add(species);
        }
        }
        return [...speciesSet]
        .filter(species => canPlayerReasonablyCatchSpecies(species, tier, biome))
        .sort((a, b) => a.value - b.value);
        }

        function chooseContractSpecies(tier, biome = null) {
        let eligible = getEligibleContractSpecies(tier, biome);
        if (eligible.length === 0 && tier > 1) eligible = getEligibleContractSpecies(tier - 1, biome);
        if (eligible.length === 0) eligible = getEligibleContractSpecies(1, 'home');
        if (eligible.length === 0) eligible = generalFishTypes.filter(fish => fish.value > 0 && fish.value <= 12);
        let maxValue = tier === 1 ? 24 : tier === 2 ? 60 : tier === 3 ? 115 : 999;
        let tierPool = eligible.filter(species => species.value <= maxValue);
        if (tierPool.length === 0) tierPool = eligible;
        return tierPool[Math.floor(Math.random() * tierPool.length)];
        }

        function chooseContractBiome(tier) {
        let biomes = getUnlockedContractBiomes();
        if (tier >= 3 && biomes.includes('lake') && Math.random() < 0.45) return 'lake';
        if (biomes.includes('ocean') && Math.random() < (tier >= 2 ? 0.25 : 0.12)) return 'ocean';
        return 'home';
        }

        function getEligibleRaritiesForTier(tier) {
        if (tier <= 1) return ['common', 'uncommon'];
        if (tier === 2) return ['uncommon', 'rare'];
        if (tier === 3) return ['uncommon', 'rare'];
        return ['uncommon', 'rare', 'trophy'];
        }

        function getRarityTierById(id) {
        return rarityTiers.find(tier => tier.id === id) || rarityTiers[0];
        }

        function getReasonableLengthThresholdForSpecies(species, tier) {
        let ratio = tier <= 1 ? 0.42 : tier === 2 ? 0.55 : tier === 3 ? 0.66 : 0.74;
        let baitBoost = Math.max(...player.ownedBaitLevels.map(level => getBaitByLevel(level).sizeBias));
        ratio = clamp(ratio - baitBoost * 0.08, 0.36, 0.78);
        return Math.round((species.minLength + (species.maxLength - species.minLength) * ratio) * 10) / 10;
        }

        function getAverageEligibleFishValue(tier) {
        let eligible = getEligibleContractSpecies(tier);
        if (eligible.length === 0) return 10;
        let total = eligible.reduce((sum, species) => sum + species.value, 0);
        return Math.max(8, Math.round(total / eligible.length));
        }

        function makeContractBase(type, tier, fields) {
        let reward = Math.max(8, Math.round(fields.reward || 10));
        return {
        id: contractBoard.nextId++,
        type,
        title: fields.title,
        description: fields.description,
        requirementText: fields.requirementText,
        biome: fields.biome || null,
        targetSpecies: fields.targetSpecies || null,
        targetRarity: fields.targetRarity || null,
        minLength: fields.minLength || null,
        quantity: fields.quantity || 1,
        targetValue: fields.targetValue || null,
        reward,
        rewardText: `$${reward}`,
        status: 'available',
        progress: 0,
        progressGoal: fields.progressGoal || fields.quantity || 1,
        depositedValue: 0,
        accepted: false,
        generatedForRodLevel: player.rodLevel,
        generatedForBaitLevel: player.baitLevel,
        generatedForOwnedBaitLevels: [...player.ownedBaitLevels],
        generatedForBiomeAccess: getUnlockedContractBiomes(),
        generatedAtRefresh: contractBoard.refreshNumber,
        claimable: false,
        completed: false
        };
        }

        function generateSpeciesQuantityContract(tier, biome = null) {
        let species = chooseContractSpecies(tier, biome);
        let quantity = tier <= 1 ? 2 + Math.floor(Math.random() * 2) : tier === 2 ? 2 + Math.floor(Math.random() * 3) : tier === 3 ? 2 + Math.floor(Math.random() * 3) : 3 + Math.floor(Math.random() * 3);
        if (species.value >= 55) quantity = Math.min(quantity, tier >= 4 ? 2 : 1);
        let reward = species.value * quantity * (1.45 + tier * 0.12);
        let prefix = biome === 'lake' ? 'Lake Board' : biome === 'ocean' ? 'Beach Cooler' : 'Market Order';
        return makeContractBase('species_quantity', tier, {
        title: `${prefix}: ${species.name}`,
        description: `Barkley needs fresh ${species.name} for the lunch crowd.`,
        requirementText: `Bring ${quantity} ${species.name}`,
        biome,
        targetSpecies: species.name,
        quantity,
        progressGoal: quantity,
        reward
        });
        }

        function generateSpeciesSizeContract(tier, biome = null) {
        let species = chooseContractSpecies(Math.max(1, tier), biome);
        let minLength = getReasonableLengthThresholdForSpecies(species, tier);
        let reward = species.value * (2.0 + tier * 0.35);
        return makeContractBase('species_size', tier, {
        title: `Big ${species.name} Order`,
        description: `One good-sized ${species.name} wanted for a picky regular.`,
        requirementText: `Bring a ${species.name} ${formatFishLength(minLength)} or larger`,
        biome,
        targetSpecies: species.name,
        minLength,
        quantity: 1,
        progressGoal: 1,
        reward
        });
        }

        function generateSpeciesRarityContract(tier, biome = null) {
        let species = chooseContractSpecies(tier, biome);
        let rarities = getEligibleRaritiesForTier(tier);
        let rarityId = rarities[Math.floor(Math.random() * rarities.length)];
        if (rarityId === 'trophy' && species.value > 90 && player.rodLevel < 5) rarityId = 'rare';
        let rarity = getRarityTierById(rarityId);
        let reward = species.value * rarity.valueMultiplier * (1.7 + tier * 0.25);
        return makeContractBase('species_rarity', tier, {
        title: `${rarity.label} ${species.name} Request`,
        description: `Local order: ${rarity.label.toLowerCase()} catch requested.`,
        requirementText: `Bring 1 ${rarity.label} ${species.name}`,
        biome,
        targetSpecies: species.name,
        targetRarity: rarity.id,
        quantity: 1,
        progressGoal: 1,
        reward
        });
        }

        function generateGeneralCatchContract(tier) {
        let quantity = tier <= 1 ? 3 : tier === 2 ? 4 : tier === 3 ? 5 : 6;
        let avg = getAverageEligibleFishValue(tier);
        let reward = avg * quantity * 1.25;
        return makeContractBase('any_count', tier, {
        title: 'Fresh Catch Crate',
        description: 'Any clean catch will fill the crate today.',
        requirementText: `Bring ${quantity} fish of any kind`,
        quantity,
        progressGoal: quantity,
        reward
        });
        }

        function generateTotalValueContract(tier) {
        let targetValue = Math.round((tier <= 1 ? 28 : tier === 2 ? 65 : tier === 3 ? 115 : 190) / 5) * 5;
        return makeContractBase('total_value', tier, {
        title: 'Premium Counter Sale',
        description: 'Barkley is paying extra for one strong bag.',
        requirementText: `Bring fish worth at least $${targetValue} total`,
        targetValue,
        quantity: 1,
        progressGoal: targetValue,
        reward: targetValue * (1.32 + tier * 0.05)
        });
        }

        function generateBiomeBundleContract(tier) {
        let biome = chooseContractBiome(Math.max(3, tier));
        if (biome !== 'lake') biome = getUnlockedContractBiomes().includes('lake') ? 'lake' : biome;
        let quantity = tier >= 4 ? 3 : 2;
        let label = biome === 'lake' ? 'lake' : biome === 'ocean' ? 'beach' : 'pond';
        let avg = getAverageEligibleFishValue(tier);
        return makeContractBase('biome_count', tier, {
        title: `${label[0].toUpperCase() + label.slice(1)} Board Special`,
        description: `The board is paying well for ${label} fish today.`,
        requirementText: `Bring ${quantity} fish caught from the ${label}`,
        biome,
        quantity,
        progressGoal: quantity,
        reward: avg * quantity * (1.55 + tier * 0.12)
        });
        }

        function generateContract(tier = getContractDifficultyTier()) {
        let biome = chooseContractBiome(tier);
        let types = tier <= 1
        ? ['species_quantity', 'species_quantity', 'any_count', 'species_size']
        : tier === 2
        ? ['species_quantity', 'species_size', 'species_rarity', 'any_count', 'total_value']
        : ['species_quantity', 'species_size', 'species_rarity', 'total_value', 'biome_count'];
        let type = types[Math.floor(Math.random() * types.length)];
        if (type === 'biome_count' && !getUnlockedContractBiomes().includes('lake')) type = 'species_quantity';
        if (type === 'species_quantity') return generateSpeciesQuantityContract(tier, biome);
        if (type === 'species_size') return generateSpeciesSizeContract(tier, biome);
        if (type === 'species_rarity') return generateSpeciesRarityContract(tier, biome);
        if (type === 'total_value') return generateTotalValueContract(tier);
        if (type === 'biome_count') return generateBiomeBundleContract(tier);
        return generateGeneralCatchContract(tier);
        }

        function refillEmptyContracts(forceRefresh = false) {
        let tier = getContractDifficultyTier();
        contractBoard.lastGeneratedTier = tier;
        if (forceRefresh) {
        contractBoard.active = contractBoard.active.filter(contract => contract.accepted && !contract.completed);
        contractBoard.refreshNumber++;
        }
        contractBoard.active = contractBoard.active.filter(contract => !contract.completed);
        while (contractBoard.active.length < contractBoard.maxActive) {
        contractBoard.active.push(generateContract(tier));
        }
        contractBoard.lastMessage = forceRefresh ? "New requests posted." : "Fresh orders are pinned up.";
        if (shopUI.selected >= contractBoard.active.length + 1) shopUI.selected = Math.max(0, contractBoard.active.length - 1);
        updateContractBoardProgress();
        }

        function getFishSpeciesName(fish) {
        return fish.speciesName || fish.name;
        }

        function fishMatchesContract(fish, contract) {
        if (!fish || !contract) return false;
        if (!contract.accepted || contract.completed || getContractProgress(contract).ready) return false;
        if (contract.targetSpecies && getFishSpeciesName(fish) !== contract.targetSpecies) return false;
        if (contract.targetRarity && fish.rarity !== contract.targetRarity) return false;
        if (contract.minLength && fish.length < contract.minLength) return false;
        if (contract.type === 'biome_count') {
        if (fish.sourceBiome === contract.biome) return true;
        let species = allFishTypes.find(entry => entry.name === getFishSpeciesName(fish));
        return species && isSpeciesInBiome(species, contract.biome) && contract.biome !== 'lake';
        }
        return true;
        }

        function fishMeetsContractConditions(fish, contract) {
        if (!fish || !contract) return false;
        if (contract.targetSpecies && getFishSpeciesName(fish) !== contract.targetSpecies) return false;
        if (contract.targetRarity && fish.rarity !== contract.targetRarity) return false;
        if (contract.minLength && fish.length < contract.minLength) return false;
        if (contract.type === 'biome_count') {
        if (fish.sourceBiome === contract.biome) return true;
        let species = allFishTypes.find(entry => entry.name === getFishSpeciesName(fish));
        return species && isSpeciesInBiome(species, contract.biome) && contract.biome !== 'lake';
        }
        return contract.type !== 'total_value' || fish.value > 0;
        }

        function getMatchingFishIndicesForContract(contract) {
        let matches = [];
        if (contract.type === 'total_value') {
        let candidates = player.fishBag
        .map((fish, index) => ({ fish, index }))
        .filter(entry => entry.fish.value > 0)
        .sort((a, b) => a.fish.value - b.fish.value);
        let total = 0;
        for (let entry of candidates) {
        matches.push(entry.index);
        total += entry.fish.value;
        if (total >= contract.targetValue) break;
        }
        return total >= contract.targetValue ? matches : [];
        }

        let candidates = player.fishBag
        .map((fish, index) => ({ fish, index }))
        .filter(entry => fishMatchesContract(entry.fish, contract))
        .sort((a, b) => (a.fish.value - b.fish.value) || (a.fish.length - b.fish.length));
        return candidates.slice(0, contract.quantity).map(entry => entry.index);
        }

        function getContractProgress(contract) {
        if (contract.type === 'total_value') {
        let total = contract.depositedValue || 0;
        return { current: Math.min(total, contract.targetValue), goal: contract.targetValue, ready: total >= contract.targetValue };
        }
        let count = contract.progress || 0;
        return { current: Math.min(count, contract.quantity), goal: contract.quantity, ready: count >= contract.quantity };
        }

        function updateContractBoardProgress() {
        for (let contract of contractBoard.active) {
        let progress = getContractProgress(contract);
        contract.progress = progress.current;
        contract.progressGoal = progress.goal;
        contract.claimable = progress.ready;
        if (contract.completed) contract.status = 'completed';
        else if (!contract.accepted) contract.status = 'available';
        else contract.status = progress.ready ? 'ready' : 'accepted';
        }
        }

        function getReadyContractCount() {
        if (contractBoard.active.length === 0) refillEmptyContracts();
        updateContractBoardProgress();
        return contractBoard.active.filter(contract => contract.accepted && contract.claimable).length;
        }

        function getContractProgressText(contract) {
        let progress = getContractProgress(contract);
        if (contract.type === 'total_value') return `$${progress.current} / $${progress.goal}`;
        return `${progress.current} / ${progress.goal}`;
        }

        function getContractStatusText(contract) {
        let progress = getContractProgress(contract);
        if (contract.completed) return 'Completed';
        if (!contract.accepted) return 'Available';
        if (progress.ready) return 'Ready';
        return 'Accepted';
        }

        function getContractFailureMessage(contract) {
        if (player.fishBag.length === 0) return "No fish in your bag right now.";
        if (contract.type === 'species_size') return "Bring me a bigger one.";
        if (contract.type === 'species_rarity') return "Right fish, wrong shine. Keep casting.";
        if (contract.type === 'total_value') return "That bag is not valuable enough yet.";
        if (contract.type === 'biome_count') return "Those need to come from the right water.";
        return "Not enough matching fish.";
        }

        function consumeFishForContract(indices) {
        let sorted = [...indices].sort((a, b) => b - a);
        for (let index of sorted) player.fishBag.splice(index, 1);
        }

        function awardContractReward(contract) {
        awardMoney(contract.reward, true, true);
        addFloatingText(`CONTRACT +$${contract.reward}`, player.x - 34, player.y - 48, '#f1c40f');
        }

        function getAcceptedContracts() {
        refillEmptyContracts();
        updateContractBoardProgress();
        return contractBoard.active.filter(contract => contract.accepted && !contract.completed);
        }

        function getAvailableContracts() {
        refillEmptyContracts();
        return contractBoard.active.filter(contract => !contract.accepted && !contract.completed);
        }

        function acceptSelectedContract() {
        refillEmptyContracts();
        let contract = contractBoard.active[shopUI.selected];
        if (!contract) return;
        if (contract.accepted) {
        setShopMessage("Already accepted. Use the barrel outside to deposit fish.");
        playUISound('uiError', { volume: 0.7 });
        return;
        }
        contract.accepted = true;
        contract.status = 'accepted';
        contract.progress = 0;
        contract.depositedValue = 0;
        setShopMessage("Contract accepted. Bring fish to the barrel outside.");
        addFloatingText("CONTRACT ACCEPTED", player.x - 42, player.y - 36, '#f1c40f');
        playUISound('equip', { volume: 0.8 });
        }

        function getContractSpecificityScore(contract) {
        if (contract.type === 'species_rarity') return 60;
        if (contract.type === 'species_size') return 55;
        if (contract.type === 'species_quantity') return 45;
        if (contract.type === 'biome_count') return 35;
        if (contract.type === 'total_value') return 20;
        if (contract.type === 'any_count') return 10;
        return 0;
        }

        function getMatchingAcceptedContractsForFish(fish) {
        return getAcceptedContracts()
        .filter(contract => fishMeetsContractConditions(fish, contract) && !getContractProgress(contract).ready)
        .sort((a, b) => getContractSpecificityScore(b) - getContractSpecificityScore(a) || a.id - b.id);
        }

        function completeAcceptedContract(contract) {
        contract.completed = true;
        contract.status = 'completed';
        awardContractReward(contract);
        setDepositMessage(`Contract completed. Paid ${contract.rewardText}.`);
        addFloatingText("CONTRACT COMPLETE!", player.x - 42, player.y - 48, '#f1c40f');
        contractBoard.active = contractBoard.active.filter(entry => entry.id !== contract.id);
        refillEmptyContracts();
        }

        function applyFishToAcceptedContract(fish, contract) {
        if (contract.type === 'total_value') {
        contract.depositedValue = (contract.depositedValue || 0) + fish.value;
        } else {
        contract.progress = (contract.progress || 0) + 1;
        }
        updateContractBoardProgress();
        if (getContractProgress(contract).ready) {
        completeAcceptedContract(contract);
        } else {
        setDepositMessage(`Deposited into ${contract.title}.`);
        addFloatingText("DEPOSITED", player.x - 24, player.y - 32, '#2ecc71');
        }
        }

        function depositSelectedFishToContracts() {
        if (player.fishBag.length === 0) {
        setDepositMessage("Barrel is empty. No fish in your bag.");
        playUISound('uiError', { volume: 0.75 });
        return;

        if (getAcceptedContracts().length === 0) {
        setDepositMessage("No accepted contracts. Accept one inside first.");
        playUISound('uiError', { volume: 0.75 });
        return;

        let fish = player.fishBag[depositUI.selected];
        if (!fish) return;
        let matches = getMatchingAcceptedContractsForFish(fish);
        if (matches.length === 0) {
        setDepositMessage("No accepted contract matches that fish.");
        playUISound('uiError', { volume: 0.75 });
        return;

        let contract = matches[0];
        player.fishBag.splice(depositUI.selected, 1);
        if (depositUI.selected >= player.fishBag.length) depositUI.selected = Math.max(0, player.fishBag.length - 1);
        applyFishToAcceptedContract(fish, contract);
        playUISound('sell', { volume: 0.65 });

        function getRodStatus(rod) {
        if (rod.level < player.rodLevel) return 'Owned';
        if (rod.level === player.rodLevel) return 'Equipped';
        if (rod.level === player.rodLevel + 1) return 'Available';
        return 'Locked';
        }

        function getBaitStatus(bait) {
        if (player.baitLevel === bait.level) return 'Equipped';
        if (player.ownedBaitLevels.includes(bait.level)) return 'Owned';
        let previousOwned = bait.level === 1 || player.ownedBaitLevels.includes(bait.level - 1);
        return previousOwned ? 'Available' : 'Locked';
        }

        function buySelectedRod() {
        let rod = getShopOptions()[shopUI.selected];
        if (!rod) return;
        let status = getRodStatus(rod);
        if (status === 'Owned' || status === 'Equipped') {
        setShopMessage(`${rod.name} is already yours.`);
        playUISound('uiError', { volume: 0.75 });
        return;
        }
        if (status === 'Locked') {
        setShopMessage("That rod is still locked. Buy the earlier upgrade first.");
        playUISound('uiError', { volume: 0.75 });
        return;
        }
        if (player.money < rod.cost) {
        setShopMessage(`You need $${rod.cost} for the ${rod.name} rod.`);
        playUISound('uiError', { volume: 0.75 });
        return;
        }
        player.money -= rod.cost;
        player.rodLevel = rod.level;
        setShopMessage(`${rod.name} rod equipped. Good fishing!`);
        addFloatingText("UPGRADE!", player.x, player.y - 20, '#f1c40f');
        updateQuestProgress('rodUpgraded');
        updateQuestProgress('southLakeUnlocked');
        playUISound('purchase', { volume: 0.9 });

        setShopMessage(`${bait.name} is already on your hook.`);

        return;

        playUISound('equip', { volume: 0.8 });

        if (status === 'Locked') {

        function handleShopUIInput(code) {

        if (code === 'ArrowDown' || code === 'KeyS') {

        else if (shopUI.selected === 2) { shopUI.mode = 'sell'; shopUI.selected = 0; setShopMessage("What would you like to sell?"); }

        function updateWorldClockAndWeather() {
        gameTime += timeSpeed;
        if (gameTime >= 2400) gameTime = 0;

        updateAmbientLife();
        cloudOffset += 0.2;

        function updateCamera() {
        cameraX = player.x - canvas.width / 2 + player.w / 2;
        if (cameraX < 0) cameraX = 0;
        if (cameraX > MAP_WIDTH - canvas.width) cameraX = MAP_WIDTH - canvas.width;
        
        cameraY = player.y - canvas.height / 2 + player.h / 2;
        if (cameraY < WORLD_TOP) cameraY = WORLD_TOP; // Allow panning up to extended beach area
        if (cameraY > WORLD_BOTTOM - canvas.height) cameraY = WORLD_BOTTOM - canvas.height;
        }

        function handleSceneTransitions() {
        if (currentScene === 'outdoors' && inZone(player, doorZone) && !player.isDriving) {
        currentScene = 'indoors';
        player.x = roomExit.x + 8; player.y = roomExit.y - 30;
        keys['KeyW'] = false; keys['ArrowUp'] = false;
        playUISound('door', { volume: 0.75 });
        } else if (currentScene === 'indoors' && inZone(player, roomExit)) {
        currentScene = 'outdoors';
        player.x = doorZone.x - 2; player.y = doorZone.y + 45;
        keys['KeyS'] = false; keys['ArrowDown'] = false;
        playUISound('door', { volume: 0.75 });
        } else if (currentScene === 'outdoors' && inZone(player, shopEntry) && !player.isDriving) {
        currentScene = 'shop';
        player.x = shopRoom.x + shopRoom.w/2 - 12; player.y = shopRoom.y + shopRoom.h - 60;
        keys['KeyW'] = false; keys['ArrowUp'] = false;
        playUISound('shopBell', { volume: 0.8 });
        } else if (currentScene === 'shop' && inZone(player, shopExit)) {
        currentScene = 'outdoors';
        player.x = shopEntry.x + shopEntry.w / 2 - player.w / 2; player.y = shopEntry.y + shopEntry.h + 8;
        keys['KeyS'] = false; keys['ArrowDown'] = false;
        playUISound('door', { volume: 0.72 });

        function updateFloatingTexts() {
        for(let i = floatingTexts.length - 1; i >= 0; i--) {
        floatingTexts[i].y -= 0.5;
        floatingTexts[i].life--;
        if(floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
        }
        }

        function update() {
        AudioManager.update();
        if (gameState === 'menu') {
        menuUI.t += 0.016;
        return; // Don't update game world in menu
        }
        if (gameState === 'intro') {
        updateIntroCutscene();
        return;
        }
        updateQuestFlow();
        updateStoryFlow();
        if (storyState.noticeTimer > 0) storyState.noticeTimer--;

        if (storyDialogueUI.open) return;
        
        if (shopUI.open) {
        if (shopUI.messageTimer > 0) shopUI.messageTimer--;
        return;
        }

        if (depositUI.open) {
        if (depositUI.messageTimer > 0) depositUI.messageTimer--;
        return;
        }

        if (grandpaDialogueUI.open) return;

        if (player.showInventory || player.showQuestLog) return; // FREEZE GAME WORLD

        updateWorldClockAndWeather();
        updateCamera();
        handleSceneTransitions();

        if (player.fishingState === 'none') {
        if (player.isDriving) {
        let inputX = 0; let inputY = 0;
        if (keys['KeyW'] || keys['ArrowUp']) inputY -= 1;
        if (keys['KeyS'] || keys['ArrowDown']) inputY += 1;
        if (keys['KeyA'] || keys['ArrowLeft']) inputX -= 1;
        if (keys['KeyD'] || keys['ArrowRight']) inputX += 1;

        if (inputX !== 0 && inputY !== 0) {
        let len = Math.sqrt(inputX*inputX + inputY*inputY);
        inputX /= len; inputY /= len;
        }

        let accel = 0.8;
        let friction = 0.85;

        truck.vx += inputX * accel; truck.vy += inputY * accel;
        truck.vx *= friction; truck.vy *= friction;

        let speed = Math.sqrt(truck.vx*truck.vx + truck.vy*truck.vy);
        if (speed > 0.5) truck.angle = Math.atan2(truck.vy, truck.vx);

        if (speed > 0.1) {
        if (canMoveTo(player.x + truck.vx, player.y)) player.x += truck.vx; else truck.vx = 0;
        if (canMoveTo(player.x, player.y + truck.vy)) player.y += truck.vy; else truck.vy = 0;
        truck.x = player.x; truck.y = player.y;
        }
        player.isMoving = speed > 1.0;
        player.walkTimer += speed * 0.1;
        AudioManager.updateFootsteps(player.isMoving, 'truck', true);

        } else {
        let dx = 0, dy = 0;
        if (keys['KeyW'] || keys['ArrowUp']) { dy -= player.speed; player.facing = 'up'; }
        if (keys['KeyS'] || keys['ArrowDown']) { dy += player.speed; player.facing = 'down'; }
        if (keys['KeyA'] || keys['ArrowLeft']) { dx -= player.speed; player.facing = 'left'; }
        if (keys['KeyD'] || keys['ArrowRight']) { dx += player.speed; player.facing = 'right'; }

        if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

        if (dx !== 0 || dy !== 0) {
        let walls = currentScene === 'shop' ? shopWalls : (currentScene === 'indoors' ? hutWalls : []);
        let canMoveX = true, canMoveY = true;
        
        for (let wall of walls) {
        if (player.x + dx < wall.x + wall.w && player.x + player.w + dx > wall.x &&
            player.y < wall.y + wall.h && player.y + player.h > wall.y) {
            if (dx > 0 && player.x + player.w + dx > wall.x) canMoveX = false;
            if (dx < 0 && player.x + dx < wall.x + wall.w) canMoveX = false;
            if (dy > 0 && player.y + player.h + dy > wall.y) canMoveY = false;
            if (dy < 0 && player.y + dy < wall.y + wall.h) canMoveY = false;
        }
        }
        
        if (canMoveX && canMoveTo(player.x + dx, player.y)) player.x += dx;
        if (canMoveY && canMoveTo(player.x, player.y + dy)) player.y += dy;
        player.isMoving = true;
        player.walkTimer = (player.walkTimer || 0) + 0.4;
        AudioManager.updateFootsteps(true, getPlayerSurfaceType(), false);
        } else {
        player.isMoving = false;
        player.walkTimer = 0;
        }
        }
        }
        else {
        if (player.fishingState === 'waiting') {
        player.fishingTimer--;
        if (player.fishingTimer <= 0) {
        player.fishingState = 'minigame';
        player.minigameCursor = 0;
        player.minigameDir = 1;

        // THE BITE HAPPENS! Roll species, rarity, and length before the reel minigame starts.
        let bait = getCurrentBait();
        player.currentFish = createCaughtFish(getRandomFish(player.baitLevel, player.currentFishingBiome), bait);
        player.currentFish.sourceBiome = player.currentFishingBiome;

        addFloatingText("!", player.x + player.w/2, player.y - 15, '#e74c3c');
        playUISound('bite', { volume: 0.95, cooldown: 0.25 });
        }
        }
        else if (player.fishingState === 'minigame') {
        let rod = getCurrentRod();
        let speed = getMinigameSpeed(player.currentFish, rod);

        player.minigameCursor += speed * player.minigameDir;
        if (player.minigameCursor > 1) { player.minigameCursor = 1; player.minigameDir = -1; }
        if (player.minigameCursor < 0) { player.minigameCursor = 0; player.minigameDir = 1; }
        }
        }

        updateFloatingTexts();
        }

        function drawShadow(x, y, width, height, darkness = 0.3) {
        // Only draw shadows during daytime
        let hour = gameTime / 100;
        if (hour >= 6 && hour <= 18) {
        ctx.save();
        ctx.fillStyle = `rgba(0, 0, 0, ${darkness})`;
        
        // Calculate shadow direction based on time
        let shadowAngle = (hour - 6) / 12 * Math.PI; // 6am to 6pm
        let shadowOffsetX = Math.cos(shadowAngle) * height * 0.4;
        let shadowOffsetY = Math.abs(Math.sin(shadowAngle)) * height * 0.15;
        
        ctx.beginPath();
        ctx.ellipse(x + width/2 + shadowOffsetX, y + height/2 + shadowOffsetY, width/2, height/3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        }
        }

        function drawGrassArea(x, y, width, height, ambientLight) {
        ctx.fillStyle = `rgba(126, 200, 80, ${ambientLight})`;
        ctx.fillRect(x, y, width, height);

        ctx.fillStyle = '#6ab04c';
        for (let gx = Math.floor(x / 30) * 30; gx < x + width; gx += 30) {
        for (let gy = Math.floor(y / 30) * 30; gy < y + height; gy += 30) {
        let ox = (gx * 37 + gy * 17) % 25;
        let oy = (gx * 13 + gy * 29) % 25;
        ctx.fillRect(gx + ox, gy + oy, 2, 4);
        ctx.fillRect(gx + ox + 2, gy + oy - 2, 2, 6);
        }
        }

        ctx.fillStyle = '#8ed860';
        for (let gx = Math.floor((x - 15) / 40) * 40 + 15; gx < x + width; gx += 40) {
        for (let gy = Math.floor((y - 15) / 40) * 40 + 15; gy < y + height; gy += 40) {
        let ox = (gx * 11 + gy * 23) % 30;
        let oy = (gx * 19 + gy * 7) % 30;
        ctx.fillRect(gx + ox, gy + oy, 2, 2);
        }
        }
        }

        function quadPoint(start, control, end, t) {
        let mt = 1 - t;
        return {
        x: mt * mt * start.x + 2 * mt * t * control.x + t * t * end.x,
        y: mt * mt * start.y + 2 * mt * t * control.y + t * t * end.y
        };
        }

        function drawLakeBeanPath(bounds, padX = 0, padY = 0) {

        ctx.beginPath();
        ctx.moveTo(x + w * 0.48, y + h * 0.02);
        ctx.bezierCurveTo(x + w * 0.64, y - h * 0.01, x + w * 0.80, y + h * 0.08, x + w * 0.88, y + h * 0.22);
        ctx.bezierCurveTo(x + w * 0.96, y + h * 0.36, x + w * 0.88, y + h * 0.47, x + w * 0.79, y + h * 0.51);
        ctx.bezierCurveTo(x + w * 0.94, y + h * 0.62, x + w * 0.88, y + h * 0.80, x + w * 0.73, y + h * 0.90);
        ctx.bezierCurveTo(x + w * 0.57, y + h * 1.00, x + w * 0.38, y + h * 0.96, x + w * 0.25, y + h * 0.86);
        ctx.bezierCurveTo(x + w * 0.08, y + h * 0.74, x + w * 0.01, y + h * 0.58, x + w * 0.06, y + h * 0.42);

        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(mid.x, mid.y);
        ctx.quadraticCurveTo(control.x, control.y, end.x, end.y);

        function drawSmallWoodBridge(b) {
        if (b.x1 !== undefined) {
        let dx = b.x2 - b.x1;
        let dy = b.y2 - b.y1;
        let len = Math.sqrt(dx * dx + dy * dy);
        let angle = Math.atan2(dy, dx);
        let bridgeW = b.width || 42;

        ctx.save();
        ctx.translate(b.x1, b.y1);
        ctx.rotate(angle);
        ctx.fillStyle = '#5c2200';
        ctx.fillRect(-4, -bridgeW / 2 - 3, len + 8, bridgeW + 6);
        ctx.fillStyle = '#d35400';
        for (let x = 0; x < len; x += 15) {
        let plankH = bridgeW - 4 + ((x / 15) % 3) * 2;
        ctx.fillRect(x, -plankH / 2 + Math.sin(x) * 1.5, 11, plankH);
        }
        ctx.fillStyle = '#8a3a00';
        ctx.fillRect(0, -bridgeW / 2 + 5, len, 4);
        ctx.fillRect(0, bridgeW / 2 - 9, len, 4);
        ctx.restore();
        return;
        }

        ctx.save();
        ctx.fillStyle = '#5c2200';
        ctx.fillRect(b.x - 3, b.y + 4, b.w + 6, b.h - 8);
        ctx.fillStyle = '#d35400';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = '#a04000';
        for (let y = b.y + 8; y < b.y + b.h; y += 15) ctx.fillRect(b.x, y, b.w, 3);
        ctx.fillRect(b.x + 5, b.y, 3, b.h);
        ctx.fillRect(b.x + b.w - 8, b.y, 3, b.h);
        ctx.restore();
        }

        function updateAmbientLife() {
        if (currentScene !== 'outdoors') return;

        birdSpawnTimer--;
        if (birdSpawnTimer <= 0) {
        let fromLeft = Math.random() < 0.5;
        let birdYMin = WORLD_TOP + 35;
        let birdYMax = WORLD_TOP + (canvas.height / 4);
        let birdY = birdYMin + Math.random() * (birdYMax - birdYMin);
        birds.push({
        x: fromLeft ? -35 : MAP_WIDTH + 35,
        y: birdY,
        baseY: birdY,
        vx: fromLeft ? 0.9 + Math.random() * 0.35 : -0.9 - Math.random() * 0.35,
        flap: Math.random() * Math.PI * 2,
        bob: Math.random() * Math.PI * 2,
        scale: 0.85 + Math.random() * 0.35,
        life: 1200
        });
        birdSpawnTimer = 520 + Math.random() * 520;
        }

        for (let i = birds.length - 1; i >= 0; i--) {
        let bird = birds[i];
        bird.x += bird.vx;
        bird.y = bird.baseY + Math.sin(bird.bob) * 5;
        bird.flap += 0.11;
        bird.bob += 0.025;
        bird.life--;
        if (bird.life <= 0 || bird.x < -80 || bird.x > MAP_WIDTH + 80) birds.splice(i, 1);
        }

        fishJumpTimer--;
        if (fishJumpTimer <= 0) {
        jumpingFish.push({
        x: dock.x - 160 + Math.random() * 360,
        y: beach.y - 18,
        t: 0,
        life: 44,
        dir: Math.random() < 0.5 ? -1 : 1
        });
        fishJumpTimer = 180 + Math.random() * 260;
        }

        for (let i = jumpingFish.length - 1; i >= 0; i--) {
        jumpingFish[i].t++;
        jumpingFish[i].life--;
        if (jumpingFish[i].life <= 0) jumpingFish.splice(i, 1);
        }
        }

        function drawAmbientLife() {
        ctx.save();

        for (let bird of birds) {
        let wing = Math.sin(bird.flap) * 3 * bird.scale;
        let dir = bird.vx >= 0 ? 1 : -1;
        ctx.save();
        ctx.translate(bird.x, bird.y);
        ctx.scale(dir * bird.scale, bird.scale);
        ctx.strokeStyle = 'rgba(44, 62, 80, 0.75)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-8, 0);
        ctx.lineTo(0, -3 - wing);
        ctx.lineTo(8, 0);
        ctx.stroke();
        ctx.fillStyle = 'rgba(236, 240, 241, 0.8)';
        ctx.fillRect(-1, -1, 2, 2);
        ctx.restore();
        }

        for (let fish of jumpingFish) {
        let progress = fish.t / 44;
        let arc = Math.sin(progress * Math.PI) * 18;
        let x = fish.x + progress * 36 * fish.dir;
        let y = fish.y - arc;
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(x - 4, y - 2, 8, 4);
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(x - 6 * fish.dir, y - 1, 3, 3);
        if (fish.t < 8 || fish.t > 36) {
        ctx.strokeStyle = 'rgba(236, 240, 241, 0.55)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(fish.x, fish.y + 2, 8, 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        }
        }

        ctx.restore();
        }

        function updateRain() {
        // Check for rain chance
        rainTimer++;
        if (rainTimer >= nextRainCheck) {
        rainTimer = 0;
        nextRainCheck = 200 + Math.random() * 400;
        
        // 20% chance of rain starting/stopping
        if (Math.random() < 0.2) {
        isRaining = !isRaining;
        if (isRaining) {
        rainIntensity = 0.3 + Math.random() * 0.7;
        // Initialize raindrops
        raindrops = [];
        for (let i = 0; i < 100 * rainIntensity; i++) {
        raindrops.push({
        x: Math.random() * MAP_WIDTH,
        y: Math.random() * canvas.height,
        speed: 4 + Math.random() * 4,
        length: 10 + Math.random() * 10
        });
        }
        }
        }
        }
        
        // Update raindrops
        if (isRaining) {
        for (let drop of raindrops) {
        drop.y += drop.speed;
        if (drop.y > canvas.height) {
        drop.y = -drop.length;
        drop.x = Math.random() * MAP_WIDTH;
        }
        }
        }
        }

        function drawRain() {
        // Check if rain should be disabled in interior scenes
        let indoorScenes = ['indoors', 'shop']; // Add future interior scenes here
        
        if (!isRaining || indoorScenes.includes(currentScene)) return;
        
        ctx.save();
        ctx.strokeStyle = `rgba(200, 200, 255, ${rainIntensity * 0.6})`;
        ctx.lineWidth = 1;
        
        for (let drop of raindrops) {
        ctx.beginPath();
        ctx.moveTo(drop.x - cameraX, drop.y);
        ctx.lineTo(drop.x - cameraX - 1, drop.y + drop.length);
        ctx.stroke();
        }
        ctx.restore();
        }

        function drawWrappedText(text, x, y, maxWidth, lineHeight) {
        let lines = String(text).split('\n');
        let drawY = y;
        for (let raw of lines) {
        let words = raw.split(' ');
        let line = '';
        for (let word of words) {
        let test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, drawY);
        drawY += lineHeight;
        line = word;
        } else line = test;
        }
        ctx.fillText(line, x, drawY);
        drawY += lineHeight;
        }
        return drawY;
        }
