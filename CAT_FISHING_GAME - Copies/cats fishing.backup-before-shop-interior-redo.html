<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Fisherman RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Press Start 2P', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #f1c40f;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            background-color: #7ec850; 
            image-rendering: pixelated; 
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            line-height: 1.5;
            text-align: center;
            color: #bdc3c7;
        }
        kbd {
            background: #34495e;
            padding: 3px 6px;
            border-radius: 3px;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <h1>Cat Fisherman</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div class="instructions">
        Move: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or <kbd>Arrows</kbd> | Go Inside: Walk into door<br><br>
        Near Water: Hold <kbd>SPACE</kbd> to Fish <br>
        At Town Shop: <kbd>E</kbd> to Sell Fish | <kbd>B</kbd> to Buy Rod Upgrade
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- GAME DATA & STATE ---
        const keys = {};
        let gameState = 'menu'; // 'menu' or 'playing'
        let currentScene = 'outdoors'; // 'outdoors', 'indoors', or 'shop'
        const MAP_WIDTH = 1600;
        const WORLD_TOP = -760;
        let cameraX = 0;
        let cameraY = 0;

        // Upgrades now act as Multipliers! They make the base fish stats easier to catch.
        const rodUpgrades =[
        { level: 1, cost: 0, color: '#bdc3c7', name: 'Stick', spotMulti: 1.0, speedMulti: 1.0 },
        { level: 2, cost: 50, color: '#f1c40f', name: 'Bamboo', spotMulti: 1.15, speedMulti: 0.85 },
        { level: 3, cost: 200, color: '#3498db', name: 'Carbon', spotMulti: 1.3, speedMulti: 0.70 },
        { level: 4, cost: 750, color: '#9b59b6', name: 'Magic', spotMulti: 1.5, speedMulti: 0.55 }
        ];

        // NEW LOGIC: Every fish has its own speed, sweet spot size, and probability weights!
        // Weights array: [Level 1 Rod Odds, Lvl 2 Odds, Lvl 3 Odds, Lvl 4 Odds]
        const fishTypes =[
        { name: 'Old Boot', value: 0, color: '#7f8c8d', baseSpeed: 0.02, baseSpot: 0.30, weights: [25, 15, 5, 1] },
        { name: 'Minnow', value: 5, color: '#bdc3c7', baseSpeed: 0.025, baseSpot: 0.25, weights:[55, 40, 25, 10] },
        { name: 'Trout', value: 12, color: '#2ecc71', baseSpeed: 0.035, baseSpot: 0.20, weights: [15, 25, 30, 20] },
        { name: 'Salmon', value: 30, color: '#e74c3c', baseSpeed: 0.050, baseSpot: 0.12, weights:[4.5, 15, 25, 35] },
        { name: 'Catfish', value: 60, color: '#34495e', baseSpeed: 0.065, baseSpot: 0.08, weights: [0.4, 4, 12, 24] },
        { name: 'Golden Koi', value: 150, color: '#f1c40f', baseSpeed: 0.085, baseSpot: 0.04, weights:[0.1, 1, 3, 10] }
        ];

        const player = {
        x: 170,
        y: 250,
        w: 24,
        h: 24,
        speed: 3.5,
        color: '#e67e22',
        fishBag:[],
        money: 0,
        rodLevel: 1,

        fishingState: 'none',
        fishingTimer: 0,
        currentFish: null, // The fish currently on the line!
        minigameCursor: 0,
        minigameDir: 1,

        facing: 'down',
        isMoving: false,
        walkTimer: 0,
        inventory: ['fishing_rod', null, null],
        activeSlot: 0,
        isDriving: false,
        showInventory: false
        };

        const truck = {
        x: 460,
        y: 190,
        w: 48,
        h: 48,
        angle: 0,
        vx: 0,
        vy: 0
        };

        let floatingTexts =[];
        let birds = [];
        let jumpingFish = [];
        let birdSpawnTimer = 220;
        let fishJumpTimer = 145;

        // --- TIME & WEATHER SYSTEM ---
        let gameTime = 1200; // Start at noon (0-2400 represents 24 hours)
        let timeSpeed = 0.1; // How fast time progresses (much slower now)
        let isRaining = false;
        let rainIntensity = 0;
        let rainTimer = 0;
        let nextRainCheck = 300; // Frames until next rain chance check
        let raindrops = [];
        let cloudOffset = 0;

        // --- MAP LAYOUT ---
      const waterBlocks = [
         { x: 20, y: 40, w: 400, h: 80 },
         { x: 20, y: 500, w: 400, h: 80 },
         { x: 20, y: 120, w: 80, h: 380 },
         { x: 340, y: 120, w: 100, h: 120 },
         { x: 340, y: 360, w: 100, h: 140 }
        ];
        const bridge = { x: 340, y: 240, w: 100, h: 120 };
        const road = { x: 440, y: 240, w: 860, h: 120 };
        const marketLot = { x: 1300, y: 0, w: 300, h: 600 };
        const homeParkSpot = { x: 450, y: 190, w: 90, h: 50 };
        const OCEAN_TOP = -1800;
        const beach = { x: 0, y: -560, w: MAP_WIDTH, h: 250 };
        const northRoad = {
        width: 84,
        startX: road.x + road.w / 2,
        startY: road.y + road.h / 2,
        bendX: road.x + road.w / 2,
        bendY: 15,
        endX: road.x + road.w / 2 + 260,
        endY: beach.y + 135
        };
        const roadSign = { x: road.x + road.w / 2 - 150, y: road.y - 78, collision: { x: road.x + road.w / 2 - 150, y: road.y - 78, w: 88, h: 70 } };
        const dock = { x: northRoad.endX - 30, y: beach.y - 66, w: 60, h: 126 };
        
        // Wide northern ocean. It extends above WORLD_TOP so the camera never sees its far edge.
       const northOcean = { x: 0, y: OCEAN_TOP, w: MAP_WIDTH, h: beach.y - OCEAN_TOP };
       waterBlocks.push(northOcean);
        

        const hut = { x: 120, y: 140, w: 120, h: 90 };
        const hutWalls =[
        { x: 120, y: 170, w: 40, h: 60 },
        { x: 200, y: 170, w: 40, h: 60 },
        { x: 120, y: 170, w: 120, h: 30 }
        ];
        const doorZone = { x: 160, y: 190, w: 40, h: 40 };
        const shop = { x: 1350, y: 200, w: 180, h: 120 };
        const shopZone = { x: 1350, y: 320, w: 180, h: 60 };
        const shopDoor = { x: shop.x + shop.w / 2 - 18, y: shop.y + 82, w: 36, h: 58 };
        const shopRoom = { x: 200, y: 150, w: 400, h: 300 };
        const shopExit = { x: 380, y: 440, w: 40, h: 20 };
        const shopWalls = [
            { x: 200, y: 150, w: 400, h: 8 },   // top
            { x: 200, y: 150, w: 8,   h: 300 }, // left
            { x: 592, y: 150, w: 8,   h: 300 }, // right
            { x: 200, y: 442, w: 400, h: 8 }    // bottom
        ];
        const room = { x: 200, y: 150, w: 400, h: 300 };
        const roomExit = { x: 380, y: 440, w: 40, h: 20 };
        const bed = { x: 220, y: 170, w: 60, h: 90 };

        // --- GAME LOGIC HELPER: Weighted Random Fish ---
        function getRandomFish(rodLevel) {
        let totalWeight = 0;
        let rodIndex = rodLevel - 1;
        // Add up all the odds for this specific rod
        for (let f of fishTypes) totalWeight += f.weights[rodIndex];

        let roll = Math.random() * totalWeight;
        for (let f of fishTypes) {
        roll -= f.weights[rodIndex];
        if (roll <= 0) return f;
        }
        return fishTypes[0]; // Fallback
        }

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', (e) => {
        if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();

        // Menu input handling
        if (gameState === 'menu') {
        if(e.code === 'Space' || e.code === 'Enter') {
        gameState = 'playing';
        }
        return;
        }

        if(e.code === 'KeyI') {
        player.showInventory = !player.showInventory;
        keys['Space'] = false;
        return;
        }

        if (player.showInventory) return;

        keys[e.code] = true;

        if(e.code === 'Digit1') player.activeSlot = 0;
        if(e.code === 'Digit2') player.activeSlot = 1;
        if(e.code === 'Digit3') player.activeSlot = 2;

        if(e.code === 'KeyF' && currentScene === 'outdoors') {
        if(player.isDriving) {
        player.isDriving = false;
        player.w = 24; player.h = 24;
        truck.x = player.x; truck.y = player.y;
        player.y -= 35;
        if (!canMoveTo(player.x, player.y)) player.y += 80;
        player.facing = 'down';
        } else {
        let reach = { x: player.x - 20, y: player.y - 20, w: player.w + 40, h: player.h + 40 };
        if (rectIntersect(reach, truck)) {
        player.isDriving = true;
        player.x = truck.x; player.y = truck.y;
        player.w = 48; player.h = 48;
        player.fishingState = 'none';
        }
        }
        }

        if(e.code === 'KeyR' && currentScene === 'outdoors' && inZone(player, shopZone) && !player.isDriving) {
        truck.x = 460; truck.y = 190; truck.vx = 0; truck.vy = 0; truck.angle = 0;
        addFloatingText("Truck Towed!", player.x, player.y - 20, '#f1c40f');
        }

        if(e.code === 'Space' && !e.repeat && currentScene === 'outdoors' && !player.isDriving && !inZone(player, shopZone)) {
        let isHoldingRod = player.inventory[player.activeSlot] === 'fishing_rod';
        if (isHoldingRod) {
        if (player.fishingState === 'none' && isFacingWater()) {
        player.fishingState = 'waiting';
        player.fishingTimer = Math.floor(Math.random() * 90) + 60;
        }
        else if (player.fishingState === 'waiting') {
        player.fishingState = 'none';
        addFloatingText("Too early!", player.x, player.y - 20, '#e74c3c');
        }
        else if (player.fishingState === 'minigame') {
        // CALCULATE IF WON OR LOST
        let rod = rodUpgrades[player.rodLevel - 1];
        let sweetSpot = player.currentFish.baseSpot * rod.spotMulti;
        if (sweetSpot > 0.95) sweetSpot = 0.95; // Cap to prevent math breaks

        let center = 0.5;
        let min = center - sweetSpot / 2;
        let max = center + sweetSpot / 2;

        if (player.minigameCursor >= min && player.minigameCursor <= max) {
        player.fishBag.push(player.currentFish);
        if (player.currentFish.value > 0) addFloatingText("+" + player.currentFish.name, player.x, player.y - 20, player.currentFish.color);
        else addFloatingText("+Old Boot", player.x, player.y - 20, player.currentFish.color);
        } else {
        addFloatingText("Got away...", player.x, player.y - 20, '#e74c3c');
        }
        player.fishingState = 'none';
        }
        }
        }
        });

        window.addEventListener('keyup', (e) => {
        if (player.showInventory) return;
        keys[e.code] = false;

        if(currentScene === 'shop') {
        let counterWidth = 280;
        let counterX = shopRoom.x + (shopRoom.w - counterWidth) / 2;
        let counterArea = { x: counterX, y: shopRoom.y + 130, w: counterWidth, h: 40 };
        if(inZone(player, counterArea)) {
        if(e.code === 'KeyE' && player.fishBag.length > 0) {
        let earned = player.fishBag.reduce((sum, fish) => sum + fish.value, 0);
        player.money += earned;
        addFloatingText(`+$${earned}`, player.x, player.y - 20, '#2ecc71');
        player.fishBag =[];
        }
        if(e.code === 'KeyB') {
        if(player.rodLevel < rodUpgrades.length) {
        let nextUp = rodUpgrades[player.rodLevel];
        if(player.money >= nextUp.cost) {
        player.money -= nextUp.cost;
        player.rodLevel++;
        addFloatingText("UPGRADE!", player.x, player.y - 20, '#f1c40f');
        } else {
        addFloatingText("Not enough $", player.x, player.y - 20, '#e74c3c');
        }
        } else addFloatingText("Max Level!", player.x, player.y - 20, '#9b59b6');
        }
        }
        }
        });

        // --- GAME LOGIC ---
        function rectIntersect(r1, r2) {
        return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
        }

        function inZone(p, zone) { return rectIntersect({x: p.x, y: p.y, w: p.w, h: p.h}, zone); }

        function isOnDock(rect) {
        return rect.x >= dock.x &&
               rect.x + rect.w <= dock.x + dock.w &&
               rect.y >= dock.y &&
               rect.y + rect.h <= dock.y + dock.h;
        }

        function canMoveTo(x, y) {
        let nextRect = { x: x, y: y, w: player.w, h: player.h };

        if (currentScene === 'outdoors') {
          if (x < 0 || y < WORLD_TOP || x + player.w > MAP_WIDTH || y + player.h > canvas.height) return false;
         for (let wall of hutWalls) if (rectIntersect(nextRect, wall)) return false;
        if (rectIntersect(nextRect, shop)) return false;
        if (rectIntersect(nextRect, roadSign.collision)) return false;
         for (let w of waterBlocks) if (rectIntersect(nextRect, w) && !isOnDock(nextRect)) return false;
        return true;

        } else if (currentScene === 'indoors') {
             if (x < room.x || y < room.y || x + player.w > room.x + room.w || y + player.h > room.y + room.h) {
                if (!rectIntersect(nextRect, roomExit)) return false;
         }
        if (rectIntersect(nextRect, bed)) return false;
        return true;

        } else if (currentScene === 'shop') {
            if (x < shopRoom.x || y < shopRoom.y || x + player.w > shopRoom.x + shopRoom.w || y + player.h > shopRoom.y + shopRoom.h) {
                if (!rectIntersect(nextRect, shopExit)) return false;
            }

    // counter collision
            let counterWidth = 280;
            let counterX = shopRoom.x + (shopRoom.w - counterWidth) / 2;
            let counterRect = { x: counterX, y: shopRoom.y + 100, w: counterWidth, h: 50 };
            if (rectIntersect(nextRect, counterRect)) return false;

            return true;
        }

        return false;
        }
        function isFacingWater() {
        let rodEndX = player.x; let rodEndY = player.y;
        if (player.facing === 'left') { rodEndX -= 25; rodEndY += 5; }
        else if (player.facing === 'right') { rodEndX += player.w + 25; rodEndY += 5; }
        else if (player.facing === 'up') { rodEndX += 10; rodEndY -= 25; }
        else { rodEndX += 10; rodEndY += player.h + 25; }

        let bobberRect = { x: rodEndX - 4, y: rodEndY - 4, w: 8, h: 8 };
        for(let w of waterBlocks) if(rectIntersect(bobberRect, w)) return true;
        
      
        return false;
        }

        function addFloatingText(txt, x, y, color) { floatingTexts.push({ txt, x, y, color, life: 60 }); }

        function update() {
        if (gameState === 'menu') return; // Don't update game world in menu
        
        if (player.showInventory) return; // FREEZE GAME WORLD

        // Update time
        gameTime += timeSpeed;
        if (gameTime >= 2400) gameTime = 0;

        // Update weather
        updateRain();
        updateAmbientLife();
        cloudOffset += 0.2;

        cameraX = player.x - canvas.width / 2 + player.w / 2;
        if (cameraX < 0) cameraX = 0;
        if (cameraX > MAP_WIDTH - canvas.width) cameraX = MAP_WIDTH - canvas.width;
        
        cameraY = player.y - canvas.height / 2 + player.h / 2;
        if (cameraY < WORLD_TOP) cameraY = WORLD_TOP; // Allow panning up to extended beach area
        if (cameraY > canvas.height - canvas.height) cameraY = canvas.height - canvas.height;

        if (currentScene === 'outdoors' && inZone(player, doorZone) && !player.isDriving) {
        currentScene = 'indoors';
        player.x = roomExit.x + 8; player.y = roomExit.y - 30;
        keys['KeyW'] = false; keys['ArrowUp'] = false;
        } else if (currentScene === 'indoors' && inZone(player, roomExit)) {
        currentScene = 'outdoors';
        player.x = doorZone.x - 2; player.y = doorZone.y + 45;
        keys['KeyS'] = false; keys['ArrowDown'] = false;
        } else if (currentScene === 'outdoors' && inZone(player, shopDoor) && !player.isDriving) {
        currentScene = 'shop';
        player.x = shopRoom.x + shopRoom.w/2 - 12; player.y = shopRoom.y + shopRoom.h - 60;
        keys['KeyW'] = false; keys['ArrowUp'] = false;
        } else if (currentScene === 'shop' && inZone(player, shopExit)) {
        currentScene = 'outdoors';
        player.x = shopDoor.x + shopDoor.w / 2 - player.w / 2; player.y = shop.y + shop.h + 8;
        keys['KeyS'] = false; keys['ArrowDown'] = false;
        }

        if (player.fishingState === 'none') {
        if (player.isDriving) {
        let inputX = 0; let inputY = 0;
        if (keys['KeyW'] || keys['ArrowUp']) inputY -= 1;
        if (keys['KeyS'] || keys['ArrowDown']) inputY += 1;
        if (keys['KeyA'] || keys['ArrowLeft']) inputX -= 1;
        if (keys['KeyD'] || keys['ArrowRight']) inputX += 1;

        if (inputX !== 0 && inputY !== 0) {
        let len = Math.sqrt(inputX*inputX + inputY*inputY);
        inputX /= len; inputY /= len;
        }

        let accel = 0.8;
        let friction = 0.85;

        truck.vx += inputX * accel; truck.vy += inputY * accel;
        truck.vx *= friction; truck.vy *= friction;

        let speed = Math.sqrt(truck.vx*truck.vx + truck.vy*truck.vy);
        if (speed > 0.5) truck.angle = Math.atan2(truck.vy, truck.vx);

        if (speed > 0.1) {
        if (canMoveTo(player.x + truck.vx, player.y)) player.x += truck.vx; else truck.vx = 0;
        if (canMoveTo(player.x, player.y + truck.vy)) player.y += truck.vy; else truck.vy = 0;
        truck.x = player.x; truck.y = player.y;
        }
        player.isMoving = speed > 1.0;
        player.walkTimer += speed * 0.1;

        } else {
        let dx = 0, dy = 0;
        if (keys['KeyW'] || keys['ArrowUp']) { dy -= player.speed; player.facing = 'up'; }
        if (keys['KeyS'] || keys['ArrowDown']) { dy += player.speed; player.facing = 'down'; }
        if (keys['KeyA'] || keys['ArrowLeft']) { dx -= player.speed; player.facing = 'left'; }
        if (keys['KeyD'] || keys['ArrowRight']) { dx += player.speed; player.facing = 'right'; }

        if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

        if (dx !== 0 || dy !== 0) {
        let walls = currentScene === 'shop' ? shopWalls : (currentScene === 'indoors' ? hutWalls : []);
        let canMoveX = true, canMoveY = true;
        
        for (let wall of walls) {
        if (player.x + dx < wall.x + wall.w && player.x + player.w + dx > wall.x &&
            player.y < wall.y + wall.h && player.y + player.h > wall.y) {
            if (dx > 0 && player.x + player.w + dx > wall.x) canMoveX = false;
            if (dx < 0 && player.x + dx < wall.x + wall.w) canMoveX = false;
            if (dy > 0 && player.y + player.h + dy > wall.y) canMoveY = false;
            if (dy < 0 && player.y + dy < wall.y + wall.h) canMoveY = false;
        }
        }
        
        if (canMoveX && canMoveTo(player.x + dx, player.y)) player.x += dx;
        if (canMoveY && canMoveTo(player.x, player.y + dy)) player.y += dy;
        player.isMoving = true;
        player.walkTimer = (player.walkTimer || 0) + 0.4;
        } else {
        player.isMoving = false;
        player.walkTimer = 0;
        }
        }
        }
        else {
        if (player.fishingState === 'waiting') {
        player.fishingTimer--;
        if (player.fishingTimer <= 0) {
        player.fishingState = 'minigame';
        player.minigameCursor = 0;
        player.minigameDir = 1;

        // THE BITE HAPPENS! Roll the dice to see what fish is on the hook.
        player.currentFish = getRandomFish(player.rodLevel);

        addFloatingText("!", player.x + player.w/2, player.y - 15, '#e74c3c');
        }
        }
        else if (player.fishingState === 'minigame') {
        let rod = rodUpgrades[player.rodLevel - 1];
        // Cursor speed is Fish Base Speed modified by Rod Multiplier
        let speed = player.currentFish.baseSpeed * rod.speedMulti;

        player.minigameCursor += speed * player.minigameDir;
        if (player.minigameCursor > 1) { player.minigameCursor = 1; player.minigameDir = -1; }
        if (player.minigameCursor < 0) { player.minigameCursor = 0; player.minigameDir = 1; }
        }
        }

        for(let i = floatingTexts.length - 1; i >= 0; i--) {
        floatingTexts[i].y -= 0.5;
        floatingTexts[i].life--;
        if(floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
        }
        }

        // --- PROCEDURAL FISH SPRITES ---
        function drawFishSprite(ctx, name, x, y) {
        ctx.save();
        ctx.translate(x, y);

        if (name === 'Old Boot') {
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(-6, -8, 8, 12);
        ctx.fillRect(-6, 4, 14, 6);
        ctx.fillStyle = '#95a5a6';
        ctx.fillRect(-2, -8, 4, 12);
        } else if (name === 'Minnow') {
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath(); ctx.ellipse(0, 0, 10, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-14, -4); ctx.lineTo(-14, 4); ctx.fill();
        } else if (name === 'Trout') {
        ctx.fillStyle = '#2ecc71';
        ctx.beginPath(); ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(-20, -6); ctx.lineTo(-20, 6); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.fillRect(4, -2, 2, 2); ctx.fillRect(0, 2, 2, 2); ctx.fillRect(-4, -1, 2, 2);
        } else if (name === 'Salmon') {
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.ellipse(0, 0, 16, 7, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#c0392b';
        ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(-22, -8); ctx.lineTo(-22, 8); ctx.fill();
        ctx.fillRect(8, 2, 6, 3);
        } else if (name === 'Catfish') {
        ctx.fillStyle = '#34495e';
        ctx.beginPath(); ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(-24, -8); ctx.lineTo(-24, 8); ctx.fill();
        ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(14, 2); ctx.lineTo(22, 6); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(14, 2); ctx.lineTo(22, -2); ctx.stroke();
        } else if (name === 'Golden Koi') {
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath(); ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#e67e22';
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.quadraticCurveTo(-25, -15, -20, 0); ctx.quadraticCurveTo(-25, 15, -15, 0); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(-5, -14); ctx.lineTo(5, -8); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(-5, 14); ctx.lineTo(5, 8); ctx.fill();
        }

        if (name !== 'Old Boot') {
        ctx.fillStyle = '#fff'; ctx.fillRect(6, -3, 3, 3);
        ctx.fillStyle = '#000'; ctx.fillRect(7, -2, 1, 1);
        }

        ctx.restore();
        }

        function drawShadow(x, y, width, height, darkness = 0.3) {
        // Only draw shadows during daytime
        let hour = gameTime / 100;
        if (hour >= 6 && hour <= 18) {
        ctx.save();
        ctx.fillStyle = `rgba(0, 0, 0, ${darkness})`;
        
        // Calculate shadow direction based on time
        let shadowAngle = (hour - 6) / 12 * Math.PI; // 6am to 6pm
        let shadowOffsetX = Math.cos(shadowAngle) * height * 0.4;
        let shadowOffsetY = Math.abs(Math.sin(shadowAngle)) * height * 0.15;
        
        ctx.beginPath();
        ctx.ellipse(x + width/2 + shadowOffsetX, y + height/2 + shadowOffsetY, width/2, height/3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        }
        }

        function drawGrassArea(x, y, width, height, ambientLight) {
        ctx.fillStyle = `rgba(126, 200, 80, ${ambientLight})`;
        ctx.fillRect(x, y, width, height);

        ctx.fillStyle = '#6ab04c';
        for (let gx = Math.floor(x / 30) * 30; gx < x + width; gx += 30) {
        for (let gy = Math.floor(y / 30) * 30; gy < y + height; gy += 30) {
        let ox = (gx * 37 + gy * 17) % 25;
        let oy = (gx * 13 + gy * 29) % 25;
        ctx.fillRect(gx + ox, gy + oy, 2, 4);
        ctx.fillRect(gx + ox + 2, gy + oy - 2, 2, 6);
        }
        }

        ctx.fillStyle = '#8ed860';
        for (let gx = Math.floor((x - 15) / 40) * 40 + 15; gx < x + width; gx += 40) {
        for (let gy = Math.floor((y - 15) / 40) * 40 + 15; gy < y + height; gy += 40) {
        let ox = (gx * 11 + gy * 23) % 30;
        let oy = (gx * 19 + gy * 7) % 30;
        ctx.fillRect(gx + ox, gy + oy, 2, 2);
        }
        }
        }

        function quadPoint(start, control, end, t) {
        let mt = 1 - t;
        return {
        x: mt * mt * start.x + 2 * mt * t * control.x + t * t * end.x,
        y: mt * mt * start.y + 2 * mt * t * control.y + t * t * end.y
        };
        }

        function drawCurvedNorthRoad() {
        let start = { x: northRoad.startX, y: road.y - 2 };
        let mid = { x: northRoad.bendX, y: northRoad.bendY };
        let control = { x: northRoad.bendX + 280, y: northRoad.bendY - 95 };
        let end = { x: northRoad.endX, y: northRoad.endY };

        ctx.save();
        ctx.beginPath();
        ctx.rect(0, WORLD_TOP, MAP_WIDTH, road.y - WORLD_TOP);
        ctx.clip();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        ctx.strokeStyle = '#6b4a2f';
        ctx.lineWidth = northRoad.width + 12;
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(mid.x, mid.y);
        ctx.quadraticCurveTo(control.x, control.y, end.x, end.y);
        ctx.stroke();

        ctx.strokeStyle = '#a87949';
        ctx.lineWidth = northRoad.width;
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(mid.x, mid.y);
        ctx.quadraticCurveTo(control.x, control.y, end.x, end.y);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(95, 62, 36, 0.35)';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(start.x - 18, start.y);
        ctx.lineTo(mid.x - 18, mid.y);
        ctx.quadraticCurveTo(control.x - 18, control.y, end.x - 18, end.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(start.x + 18, start.y);
        ctx.lineTo(mid.x + 18, mid.y);
        ctx.quadraticCurveTo(control.x + 18, control.y, end.x + 18, end.y);
        ctx.stroke();

        ctx.fillStyle = '#7a5635';
        for (let i = 40; i < start.y - mid.y; i += 70) {
        ctx.beginPath();
        ctx.arc(start.x - 24, start.y - i, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(start.x + 24, start.y - i - 20, 7, 0, Math.PI * 2);
        ctx.fill();
        }

        ctx.fillStyle = '#d1a267';
        for (let i = 25; i < start.y - mid.y - 15; i += 45) {
        ctx.fillRect(start.x - 30 + (i % 4), start.y - i, 5, 4);
        ctx.fillRect(start.x + 20 - (i % 6), start.y - i - 15, 7, 3);
        }
        for (let t = 0.08; t < 0.92; t += 0.13) {
        let p = quadPoint(mid, control, end, t);
        ctx.fillRect(p.x - 26 + (t * 30) % 10, p.y - 8, 6, 4);
        ctx.fillRect(p.x + 14 - (t * 20) % 8, p.y + 8, 8, 3);
        }

        ctx.restore();
        }

        function isNightTime() {
        let hour = gameTime / 100;
        return hour >= 19 || hour < 6;

        function updateAmbientLife() {
        if (currentScene !== 'outdoors') return;

        birdSpawnTimer--;
        if (birdSpawnTimer <= 0) {
        let fromLeft = Math.random() < 0.5;
        let birdYMin = WORLD_TOP + 35;
        let birdYMax = WORLD_TOP + (canvas.height / 4);
        let birdY = birdYMin + Math.random() * (birdYMax - birdYMin);
        birds.push({
        x: fromLeft ? -35 : MAP_WIDTH + 35,
        y: birdY,
        baseY: birdY,
        vx: fromLeft ? 0.9 + Math.random() * 0.35 : -0.9 - Math.random() * 0.35,
        flap: Math.random() * Math.PI * 2,
        bob: Math.random() * Math.PI * 2,
        scale: 0.85 + Math.random() * 0.35,
        life: 1200
        });
        birdSpawnTimer = 520 + Math.random() * 520;
        }

        for (let i = birds.length - 1; i >= 0; i--) {
        let bird = birds[i];
        bird.x += bird.vx;
        bird.y = bird.baseY + Math.sin(bird.bob) * 5;
        bird.flap += 0.11;
        bird.bob += 0.025;
        bird.life--;
        if (bird.life <= 0 || bird.x < -80 || bird.x > MAP_WIDTH + 80) birds.splice(i, 1);
        }

        fishJumpTimer--;
        if (fishJumpTimer <= 0) {
        jumpingFish.push({
        x: dock.x - 160 + Math.random() * 360,
        y: beach.y - 18,
        t: 0,
        life: 44,
        dir: Math.random() < 0.5 ? -1 : 1
        });
        fishJumpTimer = 180 + Math.random() * 260;
        }

        for (let i = jumpingFish.length - 1; i >= 0; i--) {
        jumpingFish[i].t++;
        jumpingFish[i].life--;
        if (jumpingFish[i].life <= 0) jumpingFish.splice(i, 1);
        }
        }

        function drawAmbientLife() {
        ctx.save();

        for (let bird of birds) {
        let wing = Math.sin(bird.flap) * 3 * bird.scale;
        let dir = bird.vx >= 0 ? 1 : -1;
        ctx.strokeStyle = 'rgba(44, 62, 80, 0.75)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(bird.x - 8 * dir * bird.scale, bird.y);
        ctx.lineTo(bird.x, bird.y - 3 * bird.scale - wing);
        ctx.lineTo(bird.x + 8 * dir * bird.scale, bird.y);
        ctx.stroke();
        ctx.fillStyle = 'rgba(236, 240, 241, 0.8)';
        ctx.fillRect(bird.x - 1, bird.y - 1, 2, 2);
        }

        for (let fish of jumpingFish) {
        let progress = fish.t / 44;
        let arc = Math.sin(progress * Math.PI) * 18;
        let x = fish.x + progress * 36 * fish.dir;
        let y = fish.y - arc;
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(x - 4, y - 2, 8, 4);
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(x - 6 * fish.dir, y - 1, 3, 3);
        if (fish.t < 8 || fish.t > 36) {
        ctx.strokeStyle = 'rgba(236, 240, 241, 0.55)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(fish.x, fish.y + 2, 8, 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        }
        }

        ctx.restore();
        }

        function updateRain() {
        // Check for rain chance
        rainTimer++;
        if (rainTimer >= nextRainCheck) {
        rainTimer = 0;
        nextRainCheck = 200 + Math.random() * 400;
        
        // 20% chance of rain starting/stopping
        if (Math.random() < 0.2) {
        isRaining = !isRaining;
        if (isRaining) {
        rainIntensity = 0.3 + Math.random() * 0.7;
        // Initialize raindrops
        raindrops = [];
        for (let i = 0; i < 100 * rainIntensity; i++) {
        raindrops.push({
        x: Math.random() * MAP_WIDTH,
        y: Math.random() * canvas.height,
        speed: 4 + Math.random() * 4,
        length: 10 + Math.random() * 10
        });
        }
        }
        }
        }
        
        // Update raindrops
        if (isRaining) {
        for (let drop of raindrops) {
        drop.y += drop.speed;
        if (drop.y > canvas.height) {
        drop.y = -drop.length;
        drop.x = Math.random() * MAP_WIDTH;
        }
        }
        }
        }

        function drawRain() {
        // Check if rain should be disabled in interior scenes
        let indoorScenes = ['indoors', 'shop']; // Add future interior scenes here
        
        if (!isRaining || indoorScenes.includes(currentScene)) return;
        
        ctx.save();
        ctx.strokeStyle = `rgba(200, 200, 255, ${rainIntensity * 0.6})`;
        ctx.lineWidth = 1;
        
        for (let drop of raindrops) {
        ctx.beginPath();
        ctx.moveTo(drop.x - cameraX, drop.y);
        ctx.lineTo(drop.x - cameraX - 1, drop.y + drop.length);
        ctx.stroke();
        }
        ctx.restore();
        }

        ctx.lineTo(128, 0);

        ctx.fill();
        ctx.fillStyle = 'rgba(241, 196, 15, 0.45)';

        if (hasDriver) {

        ctx.fillStyle = player.color; ctx.fillRect(-5, -5, 10, 10);

        ctx.moveTo(-5, -5); ctx.lineTo(-9, -7); ctx.lineTo(-1, -5);
        ctx.moveTo(-5, 5);  ctx.lineTo(-9, 7);  ctx.lineTo(-1, 5);
        ctx.fill();
        ctx.fillStyle = '#111'; ctx.fillRect(1, -4, 4, 8);

        function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        
        // Draw menu screen
        if (gameState === 'menu') {
        // Background gradient
        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#2c3e50');
        gradient.addColorStop(1, '#34495e');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Title
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 48px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.fillText('CAT FISHERMAN', canvas.width / 2, 150);
        
        // Subtitle
        ctx.fillStyle = '#ecf0f1';
        ctx.font = '16px "Press Start 2P"';
        ctx.fillText('A Fishing RPG Adventure', canvas.width / 2, 200);
        
        // Cat silhouette
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(canvas.width / 2 - 20, 250, 40, 40);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2 - 20, 250);
        ctx.lineTo(canvas.width / 2 - 25, 245);
        ctx.lineTo(canvas.width / 2 - 15, 250);
        ctx.moveTo(canvas.width / 2 + 20, 250);
        ctx.lineTo(canvas.width / 2 + 25, 245);
        ctx.lineTo(canvas.width / 2 + 15, 250);
        ctx.fill();
        
        // Fishing rod
        ctx.strokeStyle = '#bdc3c7';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2 + 15, 270);
        ctx.lineTo(canvas.width / 2 + 35, 250);
        ctx.stroke();
        
        // Start instruction
        ctx.fillStyle = '#fff';
        ctx.font = '20px "Press Start 2P"';
        ctx.fillText('Press SPACE or ENTER to Start', canvas.width / 2, 350);
        
        // Controls hint
        ctx.font = '12px "Press Start 2P"';
        ctx.fillStyle = '#95a5a6';
        ctx.fillText('Move: W/A/S/D or Arrow Keys', canvas.width / 2, 420);
        ctx.fillText('Fish: Hold SPACE near water', canvas.width / 2, 445);
        ctx.fillText('Shop: E to sell, B to upgrade', canvas.width / 2, 470);
        
        ctx.textAlign = 'left'; // Reset alignment
        return;
        }
        
        // Calculate ambient lighting based on time with smooth transitions
        let hour = gameTime / 100;
        let ambientLight = 1.0;
        let skyColor = {r: 135, g: 206, b: 235}; // Day sky

        // Define time periods with smooth transitions
        if (hour >= 0 && hour < 4) { // Late night
        ambientLight = 0.2;
        skyColor = {r: 10, g: 25, b: 41};
        } else if (hour >= 4 && hour < 6) { // Dawn transition
        let t = (hour - 4) / 2; // 0 to 1
        ambientLight = 0.2 + t * 0.4;
        skyColor = {
        r: 10 + t * (255 - 10),
        g: 25 + t * (107 - 25),
        b: 41 + t * (53 - 41)
        };
        } else if (hour >= 6 && hour < 8) { // Early morning
        let t = (hour - 6) / 2; // 0 to 1
        ambientLight = 0.6 + t * 0.4;
        skyColor = {
        r: 255 + t * (135 - 255),
        g: 107 + t * (206 - 107),
        b: 53 + t * (235 - 53)
        };
        } else if (hour >= 8 && hour < 17) { // Day
        ambientLight = 1.0;
        skyColor = {r: 135, g: 206, b: 235};
        } else if (hour >= 17 && hour < 19) { // Evening transition
        let t = (hour - 17) / 2; // 0 to 1
        ambientLight = 1.0 - t * 0.4;
        skyColor = {
        r: 135 - t * (135 - 255),
        g: 206 - t * (206 - 107),
        b: 235 - t * (235 - 53)
        };
        } else if (hour >= 19 && hour < 21) { // Dusk transition
        let t = (hour - 19) / 2; // 0 to 1
        ambientLight = 0.6 - t * 0.4;
        skyColor = {
        r: 255 - t * (255 - 10),
        g: 107 - t * (107 - 25),
        b: 53 - t * (53 - 41)
        };
        } else { // Late evening to night
        ambientLight = 0.2;
        skyColor = {r: 10, g: 25, b: 41};
        }

        // Convert RGB object to hex string
        let skyColorHex = `rgb(${Math.floor(skyColor.r)}, ${Math.floor(skyColor.g)}, ${Math.floor(skyColor.b)})`;

        // Apply ambient lighting to canvas
        ctx.fillStyle = skyColorHex;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (currentScene === 'outdoors') {
        ctx.translate(-cameraX, -cameraY);

        drawGrassArea(0, WORLD_TOP, MAP_WIDTH, canvas.height - WORLD_TOP, ambientLight);

        ctx.fillStyle = '#8d6e63'; ctx.fillRect(homeParkSpot.x, homeParkSpot.y, homeParkSpot.w, homeParkSpot.h);
        ctx.fillStyle = '#6d4c41';
        for(let i=0; i<8; i++) ctx.fillRect(homeParkSpot.x + 10 + i*9, homeParkSpot.y + 15 + (i%3)*10, 6, 4);

        ctx.fillStyle = '#7f8c8d'; ctx.fillRect(marketLot.x, marketLot.y, marketLot.w, marketLot.h);
        ctx.fillStyle = '#bdc3c7';
        for(let i=100; i<500; i+=60) { ctx.fillRect(marketLot.x + 50, i, 80, 4); ctx.fillRect(marketLot.x + 50, i, 4, 40); }

        // Wide shoreline sand
        ctx.fillStyle = '#e6b86a';
        ctx.fillRect(beach.x, beach.y, beach.w, beach.h);

        // sand texture
        for (let i = 0; i < beach.w; i += 20) {
        for (let j = 0; j < beach.h; j += 20) {
            ctx.fillStyle = '#f2cf8d';
            ctx.fillRect(beach.x + i + ((i + j) % 9), beach.y + j + ((i * 3 + j) % 7), 2, 2);

            ctx.fillStyle = '#d9a85f';
            ctx.fillRect(beach.x + i + 8 + ((i + j) % 5), beach.y + j + 10 + ((i * 5 + j) % 5), 2, 2);

            ctx.fillStyle = '#c7924e';
            ctx.fillRect(beach.x + i + 14 + ((i + j) % 4), beach.y + j + 4 + ((i * 7 + j) % 6), 1, 1);
        }
        }

        // Main road and the curved beach road
        ctx.fillStyle = '#95a5a6'; ctx.fillRect(road.x, road.y, road.w, road.h);
        drawCurvedNorthRoad();
        drawRoadSign(roadSign.x, roadSign.y);
                
        // Road edges (around dirt path)
        ctx.fillStyle = '#7f8c8d';
        for(let i=road.x+40; i<road.x+road.w; i+=120) {
        ctx.beginPath(); ctx.arc(i, road.y + 30 + Math.sin(i)*20, 8 + Math.cos(i)*4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(i+50, road.y + 80 + Math.cos(i)*30, 12 + Math.sin(i)*5, 0, Math.PI*2); ctx.fill();
        }
        for(let i=road.x; i<northRoad.startX - northRoad.width / 2; i+=60) {
        if (i % 240 !== 0) { ctx.fillStyle = 'rgba(241, 196, 15, 0.4)'; ctx.fillRect(i, road.y + road.h/2 - 4, 30, 8); }
        }
        for(let i=northRoad.startX + northRoad.width / 2; i<road.x+road.w; i+=60) {
        if (i % 240 !== 0) { ctx.fillStyle = 'rgba(241, 196, 15, 0.4)'; ctx.fillRect(i, road.y + road.h/2 - 4, 30, 8); }
        }

        let waterTime = Date.now() / 300;
        ctx.fillStyle = '#3498db';
        for(let w of waterBlocks) {
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.fillStyle = '#2980b9';
        if (w.w > 40 && w.h > 40) {
        ctx.fillRect(w.x + 10 + Math.sin(waterTime)*5, w.y + 10, 15, 4);
        ctx.fillRect(w.x + 30 + Math.cos(waterTime)*5, w.y + 30, 20, 4);
        }
        ctx.fillStyle = '#3498db';
        }

        // Ocean details near the visible shoreline
        ctx.fillStyle = '#2980b9';
        for (let x = 20; x < MAP_WIDTH; x += 90) {
        for (let y = WORLD_TOP + 35; y < beach.y - 25; y += 72) {
        ctx.fillRect(x + Math.sin((x + y + waterTime) * 0.04) * 8, y, 28, 4);

        let sweetSpot = player.currentFish.baseSpot * rodInfo.spotMulti;
        if (sweetSpot > 0.95) sweetSpot = 0.95;

        let ssW = barW * sweetSpot;
        let ssX = barX + (barW/2) - (ssW/2);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(ssX, barY, ssW, barH);

        let cursorX = barX + (player.minigameCursor * barW);
        ctx.fillStyle = '#fff';
        ctx.fillRect(cursorX - 2, barY - 4, 4, barH + 8);
        }
        }
        }

        // Draw player shadow
        if (!player.isDriving && currentScene === 'outdoors') {
        drawShadow(player.x, player.y + player.h, player.w, player.h * 0.3);
        }

        if (currentScene === 'outdoors') {
        ctx.fillStyle = '#5c2200'; for(let i=0; i<=bridge.w; i+=25) ctx.fillRect(bridge.x + i - 2, bridge.y + bridge.h - 6, 4, 12);
        ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(bridge.x, bridge.y + bridge.h - 4);
        for(let i=0; i<bridge.w; i+=25) ctx.quadraticCurveTo(bridge.x + i + 12.5, bridge.y + bridge.h, bridge.x + i + 25, bridge.y + bridge.h - 4);
        ctx.stroke();
        }

        // Draw rain effects
        drawRain();

        for(let ft of floatingTexts) {
        ctx.fillStyle = ft.color; ctx.font = '10px "Press Start 2P"'; ctx.fillText(ft.txt, ft.x, ft.y);
        }

        ctx.restore();

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(10, 10, 260, 80);
        ctx.fillStyle = '#fff'; ctx.font = '12px "Press Start 2P"';
        ctx.fillText(`Bag:   ${player.fishBag.length} Items [I]`, 25, 35);
        ctx.fillStyle = '#f1c40f'; ctx.fillText(`Money: $${player.money}`, 25, 55);
        ctx.fillStyle = rodInfo.color; ctx.fillText(`Rod:   ${rodInfo.name}`, 25, 75);

        // Time and weather display
        ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
        let timeString = `${Math.floor(hour).toString().padStart(2, '0')}:${Math.floor((hour % 1) * 60).toString().padStart(2, '0')}`;
        ctx.fillText(`Time: ${timeString}`, canvas.width - 150, 35);

        if (isRaining) {
        ctx.fillStyle = '#3498db';
        ctx.fillText('RAINING', canvas.width - 150, 55);
        }

        let barW = 126; let barH = 46;
        let barX = (canvas.width - barW) / 2; let barY = canvas.height - barH - 20;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(barX, barY, barW, barH);

        for (let i = 0; i < 3; i++) {
        let slotX = barX + 5 + (i * 40);
        if (player.activeSlot === i) {
        ctx.fillStyle = 'rgba(241, 196, 15, 0.4)'; ctx.fillRect(slotX, barY + 5, 36, 36);
        ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2;
        } else {
        ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 1;
        }
        ctx.strokeRect(slotX, barY + 5, 36, 36);
        ctx.fillStyle = '#fff'; ctx.font = '8px "Press Start 2P"'; ctx.fillText(i + 1, slotX + 4, barY + 15);

        if (player.inventory[i] === 'fishing_rod') {
        ctx.strokeStyle = rodInfo.color; ctx.lineWidth = 3; ctx.beginPath();
        ctx.moveTo(slotX + 8, barY + 35); ctx.lineTo(slotX + 28, barY + 12); ctx.stroke();
        }
        }

        if (player.isDriving) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(canvas.width - 200, 10, 180, 40);
        ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"'; ctx.fillText("Press F to Exit", canvas.width - 185, 35);
        }

        // --- INVENTORY OVERLAY DRAWING ---
        if (player.showInventory) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(100, 50, canvas.width - 200, canvas.height - 100);

        ctx.fillStyle = '#f1c40f';
        ctx.font = '16px "Press Start 2P"';
        ctx.fillText("FISH BAG", canvas.width / 2 - 60, 90);

        let startX = 145; let startY = 120;
        let slotSize = 40; let padding = 10; let cols = 10;

        for (let i = 0; i < 40; i++) {
        let col = i % cols;
        let row = Math.floor(i / cols);
        let x = startX + col * (slotSize + padding);
        let y = startY + row * (slotSize + padding);

        ctx.fillStyle = '#34495e'; ctx.fillRect(x, y, slotSize, slotSize);
        ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2; ctx.strokeRect(x, y, slotSize, slotSize);

        if (i < player.fishBag.length) {
        drawFishSprite(ctx, player.fishBag[i].name, x + slotSize/2, y + slotSize/2);
        }
        }

        ctx.fillStyle = '#fff';
        ctx.font = '10px "Press Start 2P"';
        let totalValue = player.fishBag.reduce((sum, fish) => sum + fish.value, 0);
        ctx.fillText(`Total Value: $${totalValue}`, 145, canvas.height - 75);
        ctx.fillText(`Press I to Close`, canvas.width - 275, canvas.height - 75);
        }
        }

        function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
        }

        loop();
    </script>
  
</body>
</html>
