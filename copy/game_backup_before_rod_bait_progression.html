        // --- GAME LOGIC HELPER: Weighted Random Fish ---
        function getFishPoolForBiome(biome) {
        return fishPools[biome] || fishPools.home;
        }

        function getRandomFish(rodLevel, biome = 'home') {
        let totalWeight = 0;
        let rodIndex = Math.max(0, Math.min(rodLevel - 1, rodUpgrades.length - 1));
        let pool = getFishPoolForBiome(biome);

        for (let group of pool) {
        for (let f of group.fish) totalWeight += f.weights[rodIndex] * group.weightScale;
        }

        let roll = Math.random() * totalWeight;
        for (let group of pool) {
        for (let f of group.fish) {
        roll -= f.weights[rodIndex] * group.weightScale;
        if (roll <= 0) return f;
        }
        }
        return pool[0].fish[0]; // Fallback
        }

        function rollWeightedRarity() {
        let totalWeight = rarityTiers.reduce((sum, tier) => sum + tier.weight, 0);
        let roll = Math.random() * totalWeight;
        for (let tier of rarityTiers) {
        roll -= tier.weight;
        if (roll <= 0) return tier;
        }
        return rarityTiers[0];
        }

        function rollFishLength(species) {
        let minLength = species.minLength || 1;
        let maxLength = species.maxLength || minLength;
        return minLength + Math.random() * (maxLength - minLength);
        }

        function getLengthMultiplier(species, length) {
        if (species.maxLength <= species.minLength) return 1;
        let lengthRatio = (length - species.minLength) / (species.maxLength - species.minLength);
        return fishValueSettings.lengthMultiplierMin + lengthRatio * (fishValueSettings.lengthMultiplierMax - fishValueSettings.lengthMultiplierMin);
        }

        function calculateFishValue(species, rarity, length) {
        if (species.value <= 0) return 0;
        let rarityMultiplier = rarity.valueMultiplier;
        let lengthMultiplier = getLengthMultiplier(species, length);
        return Math.max(1, Math.round(species.value * rarityMultiplier * lengthMultiplier));
        }

        function createCaughtFish(species) {
        let rarity = rollWeightedRarity();
        let length = rollFishLength(species);
        return {
        ...species,
        speciesName: species.name,
        rarity: rarity.id,
        rarityLabel: rarity.label,
        rarityMultiplier: rarity.valueMultiplier,
        rarityColor: rarity.color,
        length: length,
        lengthDisplay: formatFishLength(length),
        value: calculateFishValue(species, rarity, length),
        baseValue: species.value
        };
        }

        function formatFishLength(length) {
        return `${length.toFixed(1)} in`;
        }

        function getCatchMessage(fish) {
        return `${fish.rarityLabel} ${fish.name} ${fish.lengthDisplay} $${fish.value}`;
        }

        return;
        }

        if(e.code === 'Digit2') player.activeSlot = 1;
        if(e.code === 'Digit3') player.activeSlot = 2;

        player.facing = 'down';
        } else {
        let reach = { x: player.x - 20, y: player.y - 20, w: player.w + 40, h: player.h + 40 };
        if (rectIntersect(reach, truck)) {
        player.isDriving = true;
        player.x = truck.x; player.y = truck.y;
        player.w = 48; player.h = 48;
        player.fishingState = 'none';
        }
        }
        }

        if(e.code === 'KeyR' && currentScene === 'outdoors' && inZone(player, shopZone) && !player.isDriving) {
        truck.x = 460; truck.y = 190; truck.vx = 0; truck.vy = 0; truck.angle = 0;
        addFloatingText("Truck Towed!", player.x, player.y - 20, '#f1c40f');
        }

        if(e.code === 'Space' && !e.repeat && currentScene === 'outdoors' && !player.isDriving && !inZone(player, shopZone)) {
        let isHoldingRod = player.inventory[player.activeSlot] === 'fishing_rod';
        if (isHoldingRod) {
        let fishingBiome = getFacingWaterBiome();
        if (player.fishingState === 'none' && fishingBiome) {
        player.fishingState = 'waiting';
        player.currentFishingBiome = fishingBiome;
        player.fishingTimer = Math.floor(Math.random() * 90) + 60;
        }
        else if (player.fishingState === 'waiting') {
        player.fishingState = 'none';
        addFloatingText("Too early!", player.x, player.y - 20, '#e74c3c');
        }
        else if (player.fishingState === 'minigame') {
        // CALCULATE IF WON OR LOST
        let rod = rodUpgrades[player.rodLevel - 1];
        let sweetSpot = player.currentFish.baseSpot * rod.spotMulti;
        if (sweetSpot > 0.95) sweetSpot = 0.95; // Cap to prevent math breaks

        let center = 0.5;
        let min = center - sweetSpot / 2;
        let max = center + sweetSpot / 2;

        if (player.minigameCursor >= min && player.minigameCursor <= max) {
        player.fishBag.push(player.currentFish);
        addFloatingText("+" + getCatchMessage(player.currentFish), player.x, player.y - 20, player.currentFish.rarityColor);
        } else {
        addFloatingText("Got away...", player.x, player.y - 20, '#e74c3c');
        }
        player.fishingState = 'none';
        }
        }
        }
        }

        function handleKeyUp(e) {
        if(e.code === 'KeyE') shopUI.waitForInteractRelease = false;
        if (shopUI.open) {
        keys[e.code] = false;
        return;
        }
        if (player.showInventory) return;
        keys[e.code] = false;

        // ============================================================
        // COLLISION / TRIGGER HELPERS
        // ============================================================
        function rectIntersect(r1, r2) {
        return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
        }

        function inZone(p, zone) { return rectIntersect({x: p.x, y: p.y, w: p.w, h: p.h}, zone); }

        function rectInside(rect, zone) {
        return rect.x >= zone.x &&
               rect.x + rect.w <= zone.x + zone.w &&
               rect.y >= zone.y &&
               rect.y + rect.h <= zone.y + zone.h;
        }

        function rectOnBridge(rect, bridge) {
        if (bridge.x1 === undefined) return rectInside(rect, bridge);
        let cx = rect.x + rect.w / 2;
        let cy = rect.y + rect.h / 2;
        let dx = bridge.x2 - bridge.x1;
        let dy = bridge.y2 - bridge.y1;
        let lenSq = dx * dx + dy * dy;
        if (lenSq <= 0) return false;
        let t = ((cx - bridge.x1) * dx + (cy - bridge.y1) * dy) / lenSq;
        if (t < -0.03 || t > 1.03) return false;
        let px = bridge.x1 + dx * t;
        let py = bridge.y1 + dy * t;
        let distance = Math.sqrt((cx - px) * (cx - px) + (cy - py) * (cy - py));
        return distance <= (bridge.width || Math.max(bridge.w, bridge.h)) / 2 - 3;
        }

        function isWaterWalkable(rect) {
        return rectInside(rect, dock) || rectInside(rect, lakeIsland) || rectOnBridge(rect, lakeBridgeA) || rectOnBridge(rect, lakeBridgeB);
        }

        function isOnDock(rect) {
        return rectInside(rect, dock);
        }

        function canMoveTo(x, y) {
        let nextRect = { x: x, y: y, w: player.w, h: player.h };

        if (currentScene === 'outdoors') {
          if (x < 0 || y < WORLD_TOP || x + player.w > MAP_WIDTH || y + player.h > WORLD_BOTTOM) return false;
         for (let wall of hutWalls) if (rectIntersect(nextRect, wall)) return false;
        if (rectIntersect(nextRect, shop)) return false;
        if (rectIntersect(nextRect, roadSign.collision)) return false;
         for (let tree of lakeTreeLine) if (rectIntersect(nextRect, tree)) return false;
         for (let w of waterBlocks) if (rectIntersect(nextRect, w) && !isWaterWalkable(nextRect)) return false;
        return true;

        } else if (currentScene === 'indoors') {
             if (x < room.x || y < room.y || x + player.w > room.x + room.w || y + player.h > room.y + room.h) {
                if (!rectIntersect(nextRect, roomExit)) return false;
         }
        if (rectIntersect(nextRect, bed)) return false;
        return true;

        } else if (currentScene === 'shop') {
            if (x < shopRoom.x || y < shopRoom.y || x + player.w > shopRoom.x + shopRoom.w || y + player.h > shopRoom.y + shopRoom.h) {
                if (!rectIntersect(nextRect, shopExit)) return false;
            }

    // counter collision
            if (rectIntersect(nextRect, shopCounter)) return false;

            return true;
        }

        return false;
        }
        function getFishingProbeRect() {
        let rodEndX = player.x; let rodEndY = player.y;
        if (player.facing === 'left') { rodEndX -= 25; rodEndY += 5; }
        else if (player.facing === 'right') { rodEndX += player.w + 25; rodEndY += 5; }
        else if (player.facing === 'up') { rodEndX += 10; rodEndY -= 25; }
        else { rodEndX += 10; rodEndY += player.h + 25; }

        return { x: rodEndX - 4, y: rodEndY - 4, w: 8, h: 8 };
        }

        function getFacingWaterBiome() {
        let bobberRect = getFishingProbeRect();
        for(let w of waterBlocks) if(rectIntersect(bobberRect, w)) return w.biome || 'home';
        return null;
        }

        function isFacingWater() {
        return getFacingWaterBiome() !== null;
        }

        function addFloatingText(txt, x, y, color) { floatingTexts.push({ txt, x, y, color, life: 60 }); }

        // ============================================================
        // SHOP UI / DIALOGUE SYSTEM
        // ============================================================
        function getShopOptions() {
        if (shopUI.mode === 'buy') return rodUpgrades.slice(1);
        if (shopUI.mode === 'sell') return ['fish', 'gear'];
        return ['Buy', 'Sell', 'Leave'];
        }

        function setShopMessage(message) {
        shopUI.message = message;
        shopUI.messageTimer = 180;
        }

        function openShopUI() {
        shopUI.open = true;
        shopUI.mode = 'main';
        shopUI.selected = 0;
        shopUI.message = "Welcome in! Need a better rod or selling today?";
        shopUI.messageTimer = 0;
        player.fishingState = 'none';
        keys['KeyW'] = false; keys['KeyA'] = false; keys['KeyS'] = false; keys['KeyD'] = false;
        keys['ArrowUp'] = false; keys['ArrowDown'] = false; keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
        keys['Space'] = false;
        }

        function closeShopUI() {
        shopUI.open = false;
        shopUI.mode = 'main';
        shopUI.selected = 0;
        keys['Space'] = false;
        keys['KeyE'] = false;
        shopUI.waitForInteractRelease = true;
        }

        function getRodStatus(rod) {
        if (rod.level < player.rodLevel) return 'Owned';
        if (rod.level === player.rodLevel) return 'Equipped';
        if (rod.level === player.rodLevel + 1) return 'Available';
        return 'Locked';
        }

        function buySelectedRod() {
        let rod = getShopOptions()[shopUI.selected];
        if (!rod) return;
        let status = getRodStatus(rod);
        if (status === 'Owned' || status === 'Equipped') {
        setShopMessage(`${rod.name} is already yours.`);
        return;
        }
        if (status === 'Locked') {
        setShopMessage("That rod is still locked. Buy the earlier upgrade first.");
        return;
        }
        if (player.money < rod.cost) {
        setShopMessage(`You need $${rod.cost} for the ${rod.name} rod.`);
        return;
        }
        player.money -= rod.cost;
        player.rodLevel = rod.level;
        setShopMessage(`${rod.name} rod equipped. Good fishing!`);
        addFloatingText("UPGRADE!", player.x, player.y - 20, '#f1c40f');
        }

        function sellFishFromShopUI() {
        let earned = player.fishBag.reduce((sum, fish) => sum + fish.value, 0);
        if (earned <= 0 && player.fishBag.length === 0) {
        setShopMessage("No fish in your bag right now.");
        return;
        }
        player.money += earned;
        player.fishBag = [];
        setShopMessage(`Sold your catch for $${earned}.`);
        addFloatingText(`+$${earned}`, player.x, player.y - 20, '#2ecc71');
        }

        function handleShopUIInput(code) {
        if (code === 'Escape' || code === 'KeyX') {
        if (shopUI.mode === 'main') closeShopUI();
        else { shopUI.mode = 'main'; shopUI.selected = 0; }
        return;
        }

        let options = getShopOptions();
        if (code === 'ArrowUp' || code === 'KeyW') {
        shopUI.selected = (shopUI.selected - 1 + options.length) % options.length;
        return;
        }
        if (code === 'ArrowDown' || code === 'KeyS') {
        shopUI.selected = (shopUI.selected + 1) % options.length;
        return;
        }
        if (code !== 'Enter' && code !== 'Space' && code !== 'KeyE') return;

        if (shopUI.mode === 'main') {
        if (shopUI.selected === 0) { shopUI.mode = 'buy'; shopUI.selected = 0; setShopMessage("Pick a rod upgrade."); }
        else if (shopUI.selected === 1) { shopUI.mode = 'sell'; shopUI.selected = 0; setShopMessage("What would you like to sell?"); }
        else closeShopUI();
        } else if (shopUI.mode === 'buy') {
        buySelectedRod();
        } else if (shopUI.mode === 'sell') {
        if (shopUI.selected === 0) sellFishFromShopUI();
        else setShopMessage("Gear selling is set up for later.");
        }
        }

        // ============================================================
        // GAMEPLAY UPDATE SYSTEMS
        // ============================================================
        function updateWorldClockAndWeather() {
        gameTime += timeSpeed;
        if (gameTime >= 2400) gameTime = 0;

        updateRain();
        updateAmbientLife();
        cloudOffset += 0.2;
        }

        function updateCamera() {
        cameraX = player.x - canvas.width / 2 + player.w / 2;
        if (cameraX < 0) cameraX = 0;
        if (cameraX > MAP_WIDTH - canvas.width) cameraX = MAP_WIDTH - canvas.width;
        
        cameraY = player.y - canvas.height / 2 + player.h / 2;
        if (cameraY < WORLD_TOP) cameraY = WORLD_TOP; // Allow panning up to extended beach area
        if (cameraY > WORLD_BOTTOM - canvas.height) cameraY = WORLD_BOTTOM - canvas.height;
        }

        function handleSceneTransitions() {
        if (currentScene === 'outdoors' && inZone(player, doorZone) && !player.isDriving) {
        currentScene = 'indoors';
        player.x = roomExit.x + 8; player.y = roomExit.y - 30;
        keys['KeyW'] = false; keys['ArrowUp'] = false;
        } else if (currentScene === 'indoors' && inZone(player, roomExit)) {
        currentScene = 'outdoors';
        player.x = doorZone.x - 2; player.y = doorZone.y + 45;
        keys['KeyS'] = false; keys['ArrowDown'] = false;
        } else if (currentScene === 'outdoors' && inZone(player, shopEntry) && !player.isDriving) {
        currentScene = 'shop';
        player.x = shopRoom.x + shopRoom.w/2 - 12; player.y = shopRoom.y + shopRoom.h - 60;
        keys['KeyW'] = false; keys['ArrowUp'] = false;
        } else if (currentScene === 'shop' && inZone(player, shopExit)) {
        currentScene = 'outdoors';
        player.x = shopEntry.x + shopEntry.w / 2 - player.w / 2; player.y = shopEntry.y + shopEntry.h + 8;
        keys['KeyS'] = false; keys['ArrowDown'] = false;
        }
        }

        function updateFloatingTexts() {
        for(let i = floatingTexts.length - 1; i >= 0; i--) {
        floatingTexts[i].y -= 0.5;
        floatingTexts[i].life--;
        if(floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
        }
        }

        function update() {
        if (gameState === 'menu') return; // Don't update game world in menu
        
        if (shopUI.open) {
        if (shopUI.messageTimer > 0) shopUI.messageTimer--;
        return;
        }

        if (player.showInventory) return; // FREEZE GAME WORLD

        updateWorldClockAndWeather();
        updateCamera();
        handleSceneTransitions();

        if (player.fishingState === 'none') {
        if (player.isDriving) {
        let inputX = 0; let inputY = 0;
        if (keys['KeyW'] || keys['ArrowUp']) inputY -= 1;
        if (keys['KeyS'] || keys['ArrowDown']) inputY += 1;
        if (keys['KeyA'] || keys['ArrowLeft']) inputX -= 1;
        if (keys['KeyD'] || keys['ArrowRight']) inputX += 1;

        if (inputX !== 0 && inputY !== 0) {
        let len = Math.sqrt(inputX*inputX + inputY*inputY);
        inputX /= len; inputY /= len;
        }

        let accel = 0.8;
        let friction = 0.85;

        truck.vx += inputX * accel; truck.vy += inputY * accel;
        truck.vx *= friction; truck.vy *= friction;

        let speed = Math.sqrt(truck.vx*truck.vx + truck.vy*truck.vy);
        if (speed > 0.5) truck.angle = Math.atan2(truck.vy, truck.vx);

        if (speed > 0.1) {
        if (canMoveTo(player.x + truck.vx, player.y)) player.x += truck.vx; else truck.vx = 0;
        if (canMoveTo(player.x, player.y + truck.vy)) player.y += truck.vy; else truck.vy = 0;
        truck.x = player.x; truck.y = player.y;
        }
        player.isMoving = speed > 1.0;
        player.walkTimer += speed * 0.1;

        } else {
        let dx = 0, dy = 0;
        if (keys['KeyW'] || keys['ArrowUp']) { dy -= player.speed; player.facing = 'up'; }
        if (keys['KeyS'] || keys['ArrowDown']) { dy += player.speed; player.facing = 'down'; }
        if (keys['KeyA'] || keys['ArrowLeft']) { dx -= player.speed; player.facing = 'left'; }
        if (keys['KeyD'] || keys['ArrowRight']) { dx += player.speed; player.facing = 'right'; }

        if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

        if (dx !== 0 || dy !== 0) {
        let walls = currentScene === 'shop' ? shopWalls : (currentScene === 'indoors' ? hutWalls : []);
        let canMoveX = true, canMoveY = true;
        
        for (let wall of walls) {
        if (player.x + dx < wall.x + wall.w && player.x + player.w + dx > wall.x &&
            player.y < wall.y + wall.h && player.y + player.h > wall.y) {
            if (dx > 0 && player.x + player.w + dx > wall.x) canMoveX = false;
            if (dx < 0 && player.x + dx < wall.x + wall.w) canMoveX = false;
            if (dy > 0 && player.y + player.h + dy > wall.y) canMoveY = false;
            if (dy < 0 && player.y + dy < wall.y + wall.h) canMoveY = false;
        }
        }
        
        if (canMoveX && canMoveTo(player.x + dx, player.y)) player.x += dx;
        if (canMoveY && canMoveTo(player.x, player.y + dy)) player.y += dy;
        player.isMoving = true;
        player.walkTimer = (player.walkTimer || 0) + 0.4;
        } else {
        player.isMoving = false;
        player.walkTimer = 0;
        }
        }
        }
        else {
        if (player.fishingState === 'waiting') {
        player.fishingTimer--;
        if (player.fishingTimer <= 0) {
        player.fishingState = 'minigame';
        player.minigameCursor = 0;
        player.minigameDir = 1;

        // THE BITE HAPPENS! Roll the dice to see what fish is on the hook.
        player.currentFish = createCaughtFish(getRandomFish(player.rodLevel, player.currentFishingBiome));

        addFloatingText("!", player.x + player.w/2, player.y - 15, '#e74c3c');
        }
        }
        else if (player.fishingState === 'minigame') {
        let rod = rodUpgrades[player.rodLevel - 1];
        // Cursor speed is Fish Base Speed modified by Rod Multiplier
        let speed = player.currentFish.baseSpeed * rod.speedMulti;

        player.minigameCursor += speed * player.minigameDir;
        if (player.minigameCursor > 1) { player.minigameCursor = 1; player.minigameDir = -1; }
        if (player.minigameCursor < 0) { player.minigameCursor = 0; player.minigameDir = 1; }
        }
        }

        updateFloatingTexts();
        }

        // ============================================================
        // RENDER HELPERS / SPRITES
        // ============================================================
        // --- PROCEDURAL FISH SPRITES ---
        function drawFishSprite(ctx, name, x, y) {
        ctx.save();
        ctx.translate(x, y);

        if (name === 'Old Boot') {
        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(-6, -8, 8, 12);
        ctx.fillRect(-6, 4, 14, 6);
        ctx.fillStyle = '#95a5a6';
        ctx.fillRect(-2, -8, 4, 12);
        } else if (name === 'Minnow') {
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath(); ctx.ellipse(0, 0, 10, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-14, -4); ctx.lineTo(-14, 4); ctx.fill();
        } else if (name === 'Trout') {
        ctx.fillStyle = '#2ecc71';
        ctx.beginPath(); ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(-20, -6); ctx.lineTo(-20, 6); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.fillRect(4, -2, 2, 2); ctx.fillRect(0, 2, 2, 2); ctx.fillRect(-4, -1, 2, 2);
        } else if (name === 'Salmon') {
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.ellipse(0, 0, 16, 7, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#c0392b';
        ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(-22, -8); ctx.lineTo(-22, 8); ctx.fill();
        ctx.fillRect(8, 2, 6, 3);
        } else if (name === 'Catfish') {
        ctx.fillStyle = '#34495e';
        ctx.beginPath(); ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(-24, -8); ctx.lineTo(-24, 8); ctx.fill();
        ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(14, 2); ctx.lineTo(22, 6); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(14, 2); ctx.lineTo(22, -2); ctx.stroke();
        } else if (name === 'Golden Koi') {
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath(); ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#e67e22';
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.quadraticCurveTo(-25, -15, -20, 0); ctx.quadraticCurveTo(-25, 15, -15, 0); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(-5, -14); ctx.lineTo(5, -8); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(-5, 14); ctx.lineTo(5, 8); ctx.fill();
        } else {
        let species = allFishTypes.find(f => f.name === name) || { color: '#bdc3c7' };
        ctx.fillStyle = species.color;
        ctx.beginPath(); ctx.ellipse(0, 0, 13, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
        ctx.beginPath(); ctx.moveTo(-13, 0); ctx.lineTo(-20, -6); ctx.lineTo(-20, 6); ctx.fill();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
        ctx.fillRect(-2, -4, 8, 2);
        }

        if (name !== 'Old Boot') {
        ctx.fillStyle = '#fff'; ctx.fillRect(6, -3, 3, 3);
        ctx.fillStyle = '#000'; ctx.fillRect(7, -2, 1, 1);
        }

        ctx.restore();
        }

        function drawShadow(x, y, width, height, darkness = 0.3) {
        // Only draw shadows during daytime
        let hour = gameTime / 100;
        if (hour >= 6 && hour <= 18) {
        ctx.save();
        ctx.fillStyle = `rgba(0, 0, 0, ${darkness})`;
        
        // Calculate shadow direction based on time
        let shadowAngle = (hour - 6) / 12 * Math.PI; // 6am to 6pm
        let shadowOffsetX = Math.cos(shadowAngle) * height * 0.4;
        let shadowOffsetY = Math.abs(Math.sin(shadowAngle)) * height * 0.15;
        
        ctx.beginPath();
        ctx.ellipse(x + width/2 + shadowOffsetX, y + height/2 + shadowOffsetY, width/2, height/3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        }
        }

        function drawGrassArea(x, y, width, height, ambientLight) {
        ctx.fillStyle = `rgba(126, 200, 80, ${ambientLight})`;
        ctx.fillRect(x, y, width, height);

        ctx.fillStyle = '#6ab04c';
        for (let gx = Math.floor(x / 30) * 30; gx < x + width; gx += 30) {
        for (let gy = Math.floor(y / 30) * 30; gy < y + height; gy += 30) {
        let ox = (gx * 37 + gy * 17) % 25;
        let oy = (gx * 13 + gy * 29) % 25;
        ctx.fillRect(gx + ox, gy + oy, 2, 4);
        ctx.fillRect(gx + ox + 2, gy + oy - 2, 2, 6);
        }
        }

        ctx.fillStyle = '#8ed860';
        for (let gx = Math.floor((x - 15) / 40) * 40 + 15; gx < x + width; gx += 40) {
        for (let gy = Math.floor((y - 15) / 40) * 40 + 15; gy < y + height; gy += 40) {
        let ox = (gx * 11 + gy * 23) % 30;
        let oy = (gx * 19 + gy * 7) % 30;
        ctx.fillRect(gx + ox, gy + oy, 2, 2);
        }
        }
        }

        function quadPoint(start, control, end, t) {
        let mt = 1 - t;
        return {
        x: mt * mt * start.x + 2 * mt * t * control.x + t * t * end.x,
        y: mt * mt * start.y + 2 * mt * t * control.y + t * t * end.y
        };
        }

        function drawLakeBeanPath(bounds, padX = 0, padY = 0) {
        let x = bounds.x - padX;
        let y = bounds.y - padY;
        let w = bounds.w + padX * 2;
        let h = bounds.h + padY * 2;

        ctx.beginPath();
        ctx.moveTo(x + w * 0.48, y + h * 0.02);
        ctx.bezierCurveTo(x + w * 0.64, y - h * 0.01, x + w * 0.80, y + h * 0.08, x + w * 0.88, y + h * 0.22);
        ctx.bezierCurveTo(x + w * 0.96, y + h * 0.36, x + w * 0.88, y + h * 0.47, x + w * 0.79, y + h * 0.51);
        ctx.bezierCurveTo(x + w * 0.94, y + h * 0.62, x + w * 0.88, y + h * 0.80, x + w * 0.73, y + h * 0.90);

        ctx.fillRect(0, bridgeW / 2 - 9, len, 4);

        function updateAmbientLife() {
        if (currentScene !== 'outdoors') return;

        birdSpawnTimer--;
        if (birdSpawnTimer <= 0) {
        let fromLeft = Math.random() < 0.5;
        let birdYMin = WORLD_TOP + 35;
        let birdYMax = WORLD_TOP + (canvas.height / 4);
        let birdY = birdYMin + Math.random() * (birdYMax - birdYMin);
        birds.push({
        x: fromLeft ? -35 : MAP_WIDTH + 35,
        y: birdY,
        baseY: birdY,
        vx: fromLeft ? 0.9 + Math.random() * 0.35 : -0.9 - Math.random() * 0.35,
        flap: Math.random() * Math.PI * 2,
        bob: Math.random() * Math.PI * 2,
        scale: 0.85 + Math.random() * 0.35,
        life: 1200
        });
        birdSpawnTimer = 520 + Math.random() * 520;
        }

        for (let i = birds.length - 1; i >= 0; i--) {
        let bird = birds[i];
        bird.x += bird.vx;
        bird.y = bird.baseY + Math.sin(bird.bob) * 5;
        bird.flap += 0.11;
        bird.bob += 0.025;
        bird.life--;
        if (bird.life <= 0 || bird.x < -80 || bird.x > MAP_WIDTH + 80) birds.splice(i, 1);
        }

        fishJumpTimer--;
        if (fishJumpTimer <= 0) {
        jumpingFish.push({
        x: dock.x - 160 + Math.random() * 360,
        y: beach.y - 18,
        t: 0,
        life: 44,
        dir: Math.random() < 0.5 ? -1 : 1
        });
        fishJumpTimer = 180 + Math.random() * 260;
        }

        for (let i = jumpingFish.length - 1; i >= 0; i--) {
        jumpingFish[i].t++;
        jumpingFish[i].life--;
        if (jumpingFish[i].life <= 0) jumpingFish.splice(i, 1);
        }
        }

        function drawAmbientLife() {
        ctx.save();

        for (let bird of birds) {
        let wing = Math.sin(bird.flap) * 3 * bird.scale;
        let dir = bird.vx >= 0 ? 1 : -1;
        ctx.save();
        ctx.translate(bird.x, bird.y);
        ctx.scale(dir * bird.scale, bird.scale);
        ctx.strokeStyle = 'rgba(44, 62, 80, 0.75)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-8, 0);
        ctx.lineTo(0, -3 - wing);
        ctx.lineTo(8, 0);
        ctx.stroke();
        ctx.fillStyle = 'rgba(236, 240, 241, 0.8)';
        ctx.fillRect(-1, -1, 2, 2);
        ctx.restore();
        }

        for (let fish of jumpingFish) {
        let progress = fish.t / 44;
        let arc = Math.sin(progress * Math.PI) * 18;
        let x = fish.x + progress * 36 * fish.dir;
        let y = fish.y - arc;
        ctx.fillStyle = '#f1c40f';
        ctx.fillRect(x - 4, y - 2, 8, 4);
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(x - 6 * fish.dir, y - 1, 3, 3);
        if (fish.t < 8 || fish.t > 36) {
        ctx.strokeStyle = 'rgba(236, 240, 241, 0.55)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(fish.x, fish.y + 2, 8, 3, 0, 0, Math.PI * 2);
        ctx.stroke();
        }
        }

        ctx.restore();
        }

        function updateRain() {
        // Check for rain chance
        rainTimer++;
        if (rainTimer >= nextRainCheck) {
        rainTimer = 0;
        nextRainCheck = 200 + Math.random() * 400;
        
        // 20% chance of rain starting/stopping
        if (Math.random() < 0.2) {
        isRaining = !isRaining;
        if (isRaining) {
        rainIntensity = 0.3 + Math.random() * 0.7;
        // Initialize raindrops
        raindrops = [];
        for (let i = 0; i < 100 * rainIntensity; i++) {
        raindrops.push({
        x: Math.random() * MAP_WIDTH,
        y: Math.random() * canvas.height,
        speed: 4 + Math.random() * 4,
        length: 10 + Math.random() * 10
        });
        }
        }
        }
        }
        
        // Update raindrops
        if (isRaining) {
        for (let drop of raindrops) {
        drop.y += drop.speed;
        if (drop.y > canvas.height) {
        drop.y = -drop.length;
        drop.x = Math.random() * MAP_WIDTH;
        }
        }
        }
        }

        function drawRain() {
        // Check if rain should be disabled in interior scenes
        let indoorScenes = ['indoors', 'shop']; // Add future interior scenes here
        
        if (!isRaining || indoorScenes.includes(currentScene)) return;
        
        ctx.save();
        ctx.strokeStyle = `rgba(200, 200, 255, ${rainIntensity * 0.6})`;
        ctx.lineWidth = 1;
        
        for (let drop of raindrops) {
        ctx.beginPath();
        ctx.moveTo(drop.x - cameraX, drop.y);
        ctx.lineTo(drop.x - cameraX - 1, drop.y + drop.length);
        ctx.stroke();
        }
        ctx.restore();
        }

        // ============================================================
        function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        
        if (gameState === 'menu') {
        drawMenuScreen();
        ctx.restore();
        return;
        }
        
        // Calculate ambient lighting based on time with smooth transitions
        let hour = gameTime / 100;
        let ambientLight = 1.0;
        let skyColor = {r: 135, g: 206, b: 235}; // Day sky

        // Define time periods with smooth transitions
        if (hour >= 0 && hour < 4) { // Late night
        ambientLight = 0.2;
        skyColor = {r: 10, g: 25, b: 41};
        } else if (hour >= 4 && hour < 6) { // Dawn transition
        let t = (hour - 4) / 2; // 0 to 1
        ambientLight = 0.2 + t * 0.4;
        skyColor = {
        r: 10 + t * (255 - 10),
        g: 25 + t * (107 - 25),
        b: 41 + t * (53 - 41)
        };
        } else if (hour >= 6 && hour < 8) { // Early morning
        let t = (hour - 6) / 2; // 0 to 1
        ambientLight = 0.6 + t * 0.4;
        skyColor = {
        r: 255 + t * (135 - 255),
        g: 107 + t * (206 - 107),
        b: 53 + t * (235 - 53)
        };
        } else if (hour >= 8 && hour < 17) { // Day
        ambientLight = 1.0;
        skyColor = {r: 135, g: 206, b: 235};
        } else if (hour >= 17 && hour < 19) { // Evening transition
        let t = (hour - 17) / 2; // 0 to 1
        ambientLight = 1.0 - t * 0.4;
        skyColor = {
        r: 135 - t * (135 - 255),
        g: 206 - t * (206 - 107),
        b: 235 - t * (235 - 53)
        };
        } else if (hour >= 19 && hour < 21) { // Dusk transition
        let t = (hour - 19) / 2; // 0 to 1

        ctx.fillStyle = '#7ec850'; ctx.fillRect(roomExit.x, roomExit.y, roomExit.w, roomExit.h);
        ctx.fillStyle = '#6e2c00'; ctx.fillRect(bed.x-2, bed.y-2, bed.w+4, bed.h+4);
        ctx.fillStyle = '#3498db'; ctx.fillRect(bed.x, bed.y + 20, bed.w, bed.h - 20);
        ctx.fillStyle = '#ecf0f1'; ctx.fillRect(bed.x + 5, bed.y + 5, bed.w - 10, 15);
        ctx.fillStyle = '#c0392b'; ctx.fillRect(room.x + 150, room.y + 100, 100, 70);
        ctx.fillStyle = '#e74c3c'; for(let i=0; i<100; i+=20) ctx.fillRect(room.x + 150 + i, room.y + 100, 10, 70);
        } else if (currentScene === 'shop') {
        // Cozy Fish Market Interior
        ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#c99b66'; ctx.fillRect(shopRoom.x, shopRoom.y, shopRoom.w, shopRoom.h);
        ctx.fillStyle = '#b88755'; ctx.fillRect(shopRoom.x, shopRoom.y, shopRoom.w, 96);

        // Wooden walls and floor trim
        ctx.fillStyle = '#6d4c2d';
        ctx.fillRect(shopRoom.x, shopRoom.y, shopRoom.w, 8);
        ctx.fillRect(shopRoom.x, shopRoom.y + shopRoom.h - 8, shopRoom.w, 8);
        ctx.fillRect(shopRoom.x, shopRoom.y, 8, shopRoom.h);
        ctx.fillRect(shopRoom.x + shopRoom.w - 8, shopRoom.y, 8, shopRoom.h);
        ctx.fillStyle = '#8b5a34';
        for (let y = shopRoom.y + 105; y < shopRoom.y + shopRoom.h - 12; y += 28) {
        ctx.fillRect(shopRoom.x + 8, y, shopRoom.w - 16, 2);
        }

        // Back wall sign
        let insideSignW = 154;
        let insideSignX = shopRoom.x + (shopRoom.w - insideSignW) / 2 - 5;
        ctx.fillStyle = '#2c3e50'; ctx.fillRect(insideSignX, shopRoom.y + 20, insideSignW, 28);
        ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 13px "Press Start 2P"';
        ctx.fillText("FISH MARKET", insideSignX + 12, shopRoom.y + 40);

        // Wall displays
        ctx.fillStyle = '#6d4c41';
        ctx.fillRect(shopRoom.x + 30, shopRoom.y + 68, 118, 8);
        ctx.fillRect(shopRoom.x + shopRoom.w - 148, shopRoom.y + 68, 118, 8);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(shopRoom.x + 48, shopRoom.y + 58, 24, 7);
        ctx.fillStyle = '#e74c3c'; ctx.fillRect(shopRoom.x + 92, shopRoom.y + 58, 22, 7);
        ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(shopRoom.x + shopRoom.w - 124, shopRoom.y + 68); ctx.lineTo(shopRoom.x + shopRoom.w - 102, shopRoom.y + 38); ctx.stroke();
        ctx.strokeStyle = '#3498db';
        ctx.beginPath(); ctx.moveTo(shopRoom.x + shopRoom.w - 82, shopRoom.y + 68); ctx.lineTo(shopRoom.x + shopRoom.w - 58, shopRoom.y + 34); ctx.stroke();

        // Counter and service area
        ctx.fillStyle = '#4e342e'; ctx.fillRect(shopCounter.x, shopCounter.y, shopCounter.w, shopCounter.h);
        ctx.fillStyle = '#6d4c41'; ctx.fillRect(shopCounter.x + 4, shopCounter.y + 4, shopCounter.w - 8, shopCounter.h - 8);
        ctx.fillStyle = '#3e2723'; ctx.fillRect(shopCounter.x, shopCounter.y + shopCounter.h - 8, shopCounter.w, 8);
        ctx.fillStyle = 'rgba(241, 196, 15, 0.16)'; ctx.fillRect(shopCounterArea.x, shopCounterArea.y, shopCounterArea.w, shopCounterArea.h);

        // Goods on counter
        ctx.fillStyle = '#34495e'; ctx.fillRect(shopCounter.x + shopCounter.w - 58, shopCounter.y + 18, 44, 26);
        ctx.fillStyle = '#2c3e50'; ctx.fillRect(shopCounter.x + shopCounter.w - 54, shopCounter.y + 21, 36, 20);
        ctx.fillStyle = '#f1c40f'; ctx.fillRect(shopCounter.x + shopCounter.w - 43, shopCounter.y + 27, 14, 5);
        ctx.fillStyle = '#3498db'; ctx.fillRect(shopCounter.x + 28, shopCounter.y + 24, 24, 8);
        ctx.fillStyle = '#e67e22'; ctx.fillRect(shopCounter.x + 68, shopCounter.y + 22, 22, 7);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(shopCounter.x + 108, shopCounter.y + 25, 26, 7);

        // Shopkeeper behind counter
        let shopkeeperX = shopRoom.x + shopRoom.w / 2;
        let shopkeeperY = shopCounter.y - 48;
        drawDogShopkeeper(shopkeeperX, shopkeeperY, 1);

        // Symmetrical cozy clutter
        ctx.fillStyle = '#8b4513'; ctx.fillRect(shopRoom.x + 34, shopRoom.y + 202, 36, 36);
        ctx.fillStyle = '#a05a2c'; ctx.fillRect(shopRoom.x + 38, shopRoom.y + 206, 28, 28);
        ctx.fillStyle = '#654321'; ctx.fillRect(shopRoom.x + shopRoom.w - 70, shopRoom.y + 202, 36, 36);
        ctx.fillStyle = '#7a4b25'; ctx.fillRect(shopRoom.x + shopRoom.w - 66, shopRoom.y + 206, 28, 28);
        ctx.fillStyle = '#6d4c41'; ctx.beginPath(); ctx.arc(shopRoom.x + 88, shopRoom.y + 238, 10, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(shopRoom.x + shopRoom.w - 88, shopRoom.y + 238, 10, 0, Math.PI * 2); ctx.fill();

        // Exit door
        ctx.fillStyle = '#27ae60'; ctx.fillRect(shopExit.x, shopExit.y, shopExit.w, shopExit.h);
        ctx.fillStyle = '#fff'; ctx.font = '9px "Press Start 2P"'; ctx.fillText("EXIT", shopExit.x + 6, shopExit.y + 14);

        if (inZone(player, shopCounterArea)) {
        ctx.fillStyle = 'rgba(241, 196, 15, 0.18)';
        ctx.fillRect(shopCounterArea.x, shopCounterArea.y, shopCounterArea.w, shopCounterArea.h);
        }
        }

        let isHoldingRod = player.inventory[player.activeSlot] === 'fishing_rod';
        let rodInfo = rodUpgrades[player.rodLevel - 1];

        if (player.isDriving && currentScene === 'outdoors') {
        drawPickupTruck(player.x, player.y, truck.angle, true);
        } else {
        let bounce = player.isMoving ? Math.abs(Math.sin(player.walkTimer)) * 3 : 0;
        let drawY = player.y - bounce;

        ctx.fillStyle = '#a04000';
        let p1X = player.x + 4, p1Y = player.y + player.h - 2;
        let p2X = player.x + player.w - 8, p2Y = player.y + player.h - 2;
        if (player.isMoving) {
        let stride = Math.sin(player.walkTimer) * 4;
        if (player.facing === 'up' || player.facing === 'down') { p1Y += stride; p2Y -= stride; }
        else if (player.facing === 'right') { p1X += stride; p2X -= stride; }
        else if (player.facing === 'left') { p1X -= stride; p2X += stride; }
        }
        ctx.fillRect(p1X, p1Y, 4, 6); ctx.fillRect(p2X, p2Y, 4, 6);

        ctx.fillStyle = player.color; ctx.fillRect(player.x, drawY, player.w, player.h);
        ctx.beginPath();
        if(player.facing === 'up' || player.facing === 'down') {
        ctx.moveTo(player.x, drawY); ctx.lineTo(player.x + 6, drawY - 6); ctx.lineTo(player.x + 12, drawY);
        ctx.moveTo(player.x + player.w, drawY); ctx.lineTo(player.x + player.w - 6, drawY - 6); ctx.lineTo(player.x + player.w - 12, drawY);
        } else {
        ctx.moveTo(player.x + 5, drawY); ctx.lineTo(player.x + 10, drawY - 6); ctx.lineTo(player.x + 15, drawY);
        }
        ctx.fill();

        ctx.fillStyle = '#fff';
        if(player.facing === 'down') {
        ctx.fillRect(player.x + 4, drawY + 6, 4, 4); ctx.fillRect(player.x + 16, drawY + 6, 4, 4);
        ctx.fillStyle = '#000'; ctx.fillRect(player.x + 5, drawY + 7, 2, 2); ctx.fillRect(player.x + 17, drawY + 7, 2, 2);
        } else if(player.facing === 'right') {
        ctx.fillRect(player.x + 14, drawY + 6, 4, 4); ctx.fillStyle = '#000'; ctx.fillRect(player.x + 16, drawY + 7, 2, 2);
        } else if(player.facing === 'left') {
        ctx.fillRect(player.x + 6, drawY + 6, 4, 4); ctx.fillStyle = '#000'; ctx.fillRect(player.x + 6, drawY + 7, 2, 2);
        }

        ctx.fillStyle = '#d35400';
        let h1X, h1Y, h2X, h2Y;
        if(player.facing === 'down') {
        h1X = player.x + 2; h1Y = drawY + 14; h2X = player.x + player.w - 6; h2Y = drawY + 14;
        ctx.fillRect(h1X, h1Y, 4, 4); ctx.fillRect(h2X, h2Y, 4, 4);
        } else if(player.facing === 'up') {
        h1X = player.x + 2; h1Y = drawY + 12; h2X = player.x + player.w - 6; h2Y = drawY + 12;
        } else if(player.facing === 'right') {
        h1X = player.x + player.w - 4; h1Y = drawY + 14; ctx.fillRect(h1X, h1Y, 4, 4);
        } else if(player.facing === 'left') {
        h1X = player.x; h1Y = drawY + 14; ctx.fillRect(h1X, h1Y, 4, 4);
        }

        if (isHoldingRod && player.fishingState === 'none') {
        ctx.strokeStyle = rodInfo.color; ctx.lineWidth = 2; ctx.beginPath();
        let startX = (player.facing === 'left') ? h1X + 2 : (player.facing === 'down') ? h2X + 2 : h1X + 2;
        let startY = h1Y + 2;
        let endX = (player.facing === 'left') ? startX - 10 : startX + 10;
        let endY = startY - 20;
        ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
        }

        if (player.fishingState !== 'none' && currentScene === 'outdoors') {
        ctx.strokeStyle = rodInfo.color; ctx.lineWidth = 3; ctx.beginPath();

        let rodEndX = player.x; let rodEndY = player.y;
        let animTime = Date.now();
        let bobOffset = 0;
        if (player.fishingState === 'waiting') bobOffset = Math.sin(animTime / 200) * 3;
        else if (player.fishingState === 'minigame') bobOffset = Math.sin(animTime / 40) * 6;

        if (player.facing === 'left') { rodEndX -= 25; rodEndY += 5 + bobOffset; }
        else if (player.facing === 'right') { rodEndX += player.w + 25; rodEndY += 5 + bobOffset; }
        else if (player.facing === 'up') { rodEndX += 10 + bobOffset; rodEndY -= 25; }
        else { rodEndX += 10 + bobOffset; rodEndY += player.h + 25; }

        ctx.moveTo(player.x + player.w/2, player.y + player.h/2);
        ctx.quadraticCurveTo(player.x + player.w/2, rodEndY - 15, rodEndX, rodEndY);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; ctx.lineWidth = 1; ctx.beginPath();
        ctx.ellipse(rodEndX, rodEndY + 2, 6 + (bobOffset/3), 3, 0, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(rodEndX, rodEndY, 4, 0, Math.PI * 2); ctx.fill();

        if (player.fishingState === 'minigame') {
        ctx.fillStyle = '#fff';
        ctx.fillRect(rodEndX - 6 + Math.random()*4, rodEndY - 8 + Math.random()*4, 2, 2);
        ctx.fillRect(rodEndX + 2 + Math.random()*4, rodEndY - 6 + Math.random()*4, 2, 2);

        let barW = 80;
        let barH = 12;
        let barX = player.x + player.w/2 - barW/2;
        let barY = player.y - 45;

        ctx.fillStyle = '#000';
        ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);

        // The sweet spot dynamically calculates based on Fish Base Spot * Rod Multiplier
        let sweetSpot = player.currentFish.baseSpot * rodInfo.spotMulti;
        if (sweetSpot > 0.95) sweetSpot = 0.95;

        let ssW = barW * sweetSpot;
        let ssX = barX + (barW/2) - (ssW/2);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(ssX, barY, ssW, barH);

        let cursorX = barX + (player.minigameCursor * barW);
        ctx.fillStyle = '#fff';
        ctx.fillRect(cursorX - 2, barY - 4, 4, barH + 8);
        }
        }
        }

        // Draw player shadow
        if (!player.isDriving && currentScene === 'outdoors') {
        drawShadow(player.x, player.y + player.h, player.w, player.h * 0.3);
        }

        if (currentScene === 'outdoors') {
        ctx.fillStyle = '#5c2200'; for(let i=0; i<=bridge.w; i+=25) ctx.fillRect(bridge.x + i - 2, bridge.y + bridge.h - 6, 4, 12);
        ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(bridge.x, bridge.y + bridge.h - 4);
        for(let i=0; i<bridge.w; i+=25) ctx.quadraticCurveTo(bridge.x + i + 12.5, bridge.y + bridge.h, bridge.x + i + 25, bridge.y + bridge.h - 4);
        ctx.stroke();
        }

        // Draw rain effects
        drawRain();

        for(let ft of floatingTexts) {
        ctx.fillStyle = ft.color; ctx.font = '10px "Press Start 2P"'; ctx.fillText(ft.txt, ft.x, ft.y);
        }

        ctx.restore();

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(10, 10, 260, 80);
        ctx.fillStyle = '#fff'; ctx.font = '12px "Press Start 2P"';
        ctx.fillText(`Bag:   ${player.fishBag.length} Items [I]`, 25, 35);
        ctx.fillStyle = '#f1c40f'; ctx.fillText(`Money: $${player.money}`, 25, 55);
        ctx.fillStyle = rodInfo.color; ctx.fillText(`Rod:   ${rodInfo.name}`, 25, 75);

        // Time and weather display
        ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
        let timeString = `${Math.floor(hour).toString().padStart(2, '0')}:${Math.floor((hour % 1) * 60).toString().padStart(2, '0')}`;
        ctx.fillText(`Time: ${timeString}`, canvas.width - 150, 35);

        if (isRaining) {
        ctx.fillStyle = '#3498db';
        ctx.fillText('RAINING', canvas.width - 150, 55);
        }

        let barW = 126; let barH = 46;
        let barX = (canvas.width - barW) / 2; let barY = canvas.height - barH - 20;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(barX, barY, barW, barH);

        for (let i = 0; i < 3; i++) {
        let slotX = barX + 5 + (i * 40);
        if (player.activeSlot === i) {
        ctx.fillStyle = 'rgba(241, 196, 15, 0.4)'; ctx.fillRect(slotX, barY + 5, 36, 36);
        ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2;
        } else {
        ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 1;
        }
        ctx.strokeRect(slotX, barY + 5, 36, 36);
        ctx.fillStyle = '#fff'; ctx.font = '8px "Press Start 2P"'; ctx.fillText(i + 1, slotX + 4, barY + 15);

        if (player.inventory[i] === 'fishing_rod') {
        ctx.strokeStyle = rodInfo.color; ctx.lineWidth = 3; ctx.beginPath();
        ctx.moveTo(slotX + 8, barY + 35); ctx.lineTo(slotX + 28, barY + 12); ctx.stroke();
        }
        }

        if (player.isDriving) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(canvas.width - 200, 10, 180, 40);
        ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"'; ctx.fillText("Press F to Exit", canvas.width - 185, 35);
        }

        // --- INVENTORY OVERLAY DRAWING ---
        if (player.showInventory) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(100, 50, canvas.width - 200, canvas.height - 100);

        ctx.fillStyle = '#f1c40f';
        ctx.font = '16px "Press Start 2P"';
        ctx.fillText("FISH BAG", canvas.width / 2 - 60, 90);

        let startX = 145; let startY = 120;
        let slotSize = 40; let padding = 10; let cols = 10;

        for (let i = 0; i < 40; i++) {
        let col = i % cols;
        let row = Math.floor(i / cols);
        let x = startX + col * (slotSize + padding);
        let y = startY + row * (slotSize + padding);

        ctx.fillStyle = '#34495e'; ctx.fillRect(x, y, slotSize, slotSize);
        ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2; ctx.strokeRect(x, y, slotSize, slotSize);

        if (i < player.fishBag.length) {
        drawFishSprite(ctx, player.fishBag[i].name, x + slotSize/2, y + slotSize/2);
        }
        }

        ctx.fillStyle = '#fff';
        ctx.font = '10px "Press Start 2P"';
        let totalValue = player.fishBag.reduce((sum, fish) => sum + fish.value, 0);
        ctx.fillText(`Total Value: $${totalValue}`, 145, canvas.height - 75);
        ctx.fillText(`Press I to Close`, canvas.width - 275, canvas.height - 75);
        }

        drawShopOverlay();
        }

        // ============================================================
        // MAIN LOOP / INITIALIZATION
        // ============================================================
        function init() {
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        loop();
        }

        function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
        }

        init();
    </script>
  
</body>
</html>
